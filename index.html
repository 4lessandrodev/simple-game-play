<body>
  <div id="desktop-only-notice">
    <div class="notice-panel">
      <h1>Suporte apenas para computador</h1>
      <p>Este jogo foi desenvolvido para uso em computadores. Para jogar corretamente, abra em um desktop ou notebook.
      </p>
    </div>
  </div>
  <div id="game-container"></div>
  <script type="module">
    import { baseQuestions } from './source/questions.js';
    class DiceGameScene extends Phaser.Scene {
      constructor() {
        super('DiceGameScene');
      }

      preload() {
        this.load.audio('loading', 'audio/loading.mp3');
        this.load.audio('dice_roll', 'audio/dice_roll.wav');
        this.load.audio('token_move', 'audio/token_move.wav');
        this.load.audio('bomb_explosion', 'audio/bomb_explosion.wav');
        this.load.audio('correct_answer', 'audio/correct_answer.wav');
        this.load.audio('wrong_answer', 'audio/wrong_answer.wav');
        this.load.audio('storm_advance', 'audio/storm_advance.wav');
        this.load.audio('storm_hit', 'audio/storm_hit.wav');
        this.load.audio('win_fanfare', 'audio/win_fanfare.wav');
        this.load.audio('player_eliminated', 'audio/player_eliminated.wav');
        this.load.audio('modal_open', 'audio/modal_open.wav');
        this.load.audio('modal_action', 'audio/modal_action.wav');
        this.load.audio('modal_close', 'audio/modal_close.wav');
        this.load.audio('turn_change', 'audio/turn_change.wav');
        this.load.audio('alert_ping', 'audio/alert_ping.wav');
        this.load.audio('button_click', 'audio/button_click.wav');
        this.load.audio('suspense_buildup', 'audio/suspense_buildup.wav');
      }

      playSound(key, config = {}) {
        try {
          if (!this.sound) return;
          if (!this.cache.audio.exists(key)) {
            console.warn(`Áudio não encontrado no cache: '${key}'`);
            return;
          }
          this.sound.play(key, config);
        } catch (error) {
          console.warn(`Falha ao reproduzir áudio '${key}':`, error);
        }
      }

      create() {
        this.gameWidth = 1500;
        this.gameHeight = 1000;

        this.sidebarWidth = Math.floor(this.gameWidth * 0.40);
        this.boardAreaWidth = this.gameWidth - this.sidebarWidth;

        this.sidebarX = this.gameWidth - this.sidebarWidth;
        this.sidebarCenterX = this.sidebarX + this.sidebarWidth / 2;

        this.totalCasas = 54;

        this.cellSize = 68;
        this.cellGap = 12;

        this.boardStartX = 54;
        this.boardStartY = 110;

        this.currentPlayer = 0;
        this.gameOver = false;
        this.isAnimating = false;
        this.isQuestionOpen = false;
        this.isPlayerSetupOpen = false;
        this.isEndModalOpen = false;
        this.isDiceModalOpen = false;
        this.isSuspenseModalOpen = false;

        this.turnCount = 0;
        this.roundCount = 0;
        this.stormPosition = 0;

        this.maxPlayers = 4;
        this.activePlayersCount = 2;

        this.bombas = [10, 19, 28, 36, 46, 50];
        this.questionHouses = [4, 8, 14, 17, 24, 26, 31, 39, 44, 48, 52, 34];

        this.boardCells = {};
        this.boardTexts = {};
        this.stormOverlays = {};
        this.boardIcons = {};

        this.playerColors = [0x22c55e, 0x3b82f6, 0xf59e0b, 0xa855f7];

        this.players = [
          { nome: 'Jogador 1', posicao: 1, color: this.playerColors[0], token: null, alive: true, enabled: true },
          { nome: 'Jogador 2', posicao: 1, color: this.playerColors[1], token: null, alive: true, enabled: true },
          { nome: 'Jogador 3', posicao: 1, color: this.playerColors[2], token: null, alive: true, enabled: false },
          { nome: 'Jogador 4', posicao: 1, color: this.playerColors[3], token: null, alive: true, enabled: false }
        ];

        this.questionPools = {
          Tecnologia: this.generateCategoryQuestions('Tecnologia'),
          "Sobre o Brasil": this.generateCategoryQuestions('Brasil'),
          Filmes: this.generateCategoryQuestions('Filmes'),
          "Músicas": this.generateCategoryQuestions('Musicas'),
          "Inglês": this.generateCategoryQuestions('Ingles'),
          "K-pop": this.generateCategoryQuestions('Kpop')
        };

        this.selectedCategory = 'Tecnologia';
        this.availableQuestions = [...this.questionPools[this.selectedCategory]];

        this.input.keyboard?.addCapture('SPACE');

        this.drawLayout();
        this.createSidebar();
        this.drawBoard();
        this.createPlayers();
        this.createButtons();
        this.showPlayerSetupModal();
      }

      drawLayout() {
        this.add.rectangle(
          this.boardAreaWidth / 2,
          this.gameHeight / 2,
          this.boardAreaWidth - 30,
          this.gameHeight - 30,
          0x0f172a
        ).setStrokeStyle(2, 0x374151);

        this.add.rectangle(
          this.sidebarCenterX,
          this.gameHeight / 2,
          this.sidebarWidth - 20,
          this.gameHeight - 30,
          0x1f2937
        ).setStrokeStyle(2, 0x374151);

        this.add.text(this.sidebarCenterX, 60, 'Fuja da Tempestade', {
          fontSize: '28px',
          color: '#ffffff',
          fontStyle: 'bold'
        }).setOrigin(0.5);
      }

      wait(ms) {
        return new Promise((resolve) => {
          this.time.delayedCall(ms, resolve);
        });
      }

      getPlayerTurnFeedback(playerName, dice, posicao) {
        if (this.isBombHouse(posicao)) {
          return {
            name: playerName,
            title: 'Se lascou',
            message: 'Caiu na bomba',
            emoji: '💥',
            accent: 0xef4444,
            panelColor: 0x1f172a,
            textColor: '#ffffff',
            duration: 2400,
            shake: true
          };
        }

        if (this.isQuestionHouse(posicao)) {
          return {
            name: playerName,
            title: 'Você é inteligente?',
            message: 'Vejamos...',
            emoji: '❓',
            accent: 0xeab308,
            panelColor: 0x1f2937,
            textColor: '#ffffff',
            duration: 2600,
            shake: false
          };
        }

        if (dice <= 2) {
          return {
            name: playerName,
            title: 'Muito ruim',
            message: '',
            emoji: '😬',
            accent: 0xef4444,
            panelColor: 0x1f172a,
            textColor: '#ffffff',
            duration: 2200,
            shake: false
          };
        }

        if (dice <= 4) {
          return {
            name: playerName,
            title: 'Pode melhorar',
            message: '',
            emoji: '😐',
            accent: 0xf59e0b,
            panelColor: 0x1f2937,
            textColor: '#ffffff',
            duration: 2200,
            shake: false
          };
        }

        if (dice <= 5) {
          return {
            name: playerName,
            title: 'Boa jogada',
            message: '',
            emoji: '😎',
            accent: 0x2563eb,
            panelColor: 0x172554,
            textColor: '#ffffff',
            duration: 2200,
            shake: false
          };
        }

        return {
          name: playerName,
          title: 'Mandou bem',
          message: '',
          emoji: '🔥',
          accent: 0x22c55e,
          panelColor: 0x052e16,
          textColor: '#ffffff',
          duration: 2200,
          shake: false
        };

      }

      getRandomQuestion() {
        if (!this.availableQuestions || this.availableQuestions.length === 0) {
          this.availableQuestions = [...this.questionPools[this.selectedCategory]];
        }

        const index = Phaser.Math.Between(0, this.availableQuestions.length - 1);
        return this.availableQuestions.splice(index, 1)[0];
      }

      generateCategoryQuestions(category) {

        const template = baseQuestions[category] || baseQuestions['Tecnologia'];
        const pool = [];
        for (let i = 0; i < 50; i++) {
          const idx = i % template.length;
          pool.push({
            question: `${template[idx].question} (Pergunta ${i + 1})`,
            options: template[idx].options,
            answer: template[idx].answer
          });
        }
        return pool;
      }

      getStormTurnFeedback(dice) {
        if (dice <= 2) {
          return {
            name: '',
            title: 'Tempestade fraca',
            message: '',
            emoji: '🌫️',
            accent: 0x94a3b8,
            panelColor: 0x0f172a,
            textColor: '#ffffff',
            duration: 2200,
            shake: false
          };
        }

        if (dice <= 4) {
          return {
            name: '',
            title: 'Tempestade aumentando',
            message: '',
            emoji: '🌩️',
            accent: 0xf59e0b,
            panelColor: 0x1c1917,
            textColor: '#ffffff',
            duration: 2200,
            shake: true
          };
        }

        return {
          name: '',
          title: 'Tempestade chegando',
          message: '',
          emoji: '😈',
          accent: 0xef4444,
          panelColor: 0x111111,
          textColor: '#ffffff',
          duration: 2200,
          shake: true
        };
      }

      showSuspenseModal({
        name = '',
        title,
        message = '',
        emoji,
        accent = 0xf59e0b,
        panelColor = 0x111827,
        textColor = '#ffffff',
        duration = 2200,
        shake = false
      }) {
        return new Promise((resolve) => {
          this.isSuspenseModalOpen = true;
          this.playSound('modal_action');

          const depth = 2500;
          const centerX = this.gameWidth / 2;
          const centerY = this.gameHeight / 2;

          const hasName = !!name;
          const hasMessage = !!message;

          let modalHeight = 280;
          if (hasName) modalHeight += 40;
          if (hasMessage) modalHeight += 52;

          const modalWidth = 620;

          const overlay = this.add.rectangle(
            centerX,
            centerY,
            this.gameWidth,
            this.gameHeight,
            0x000000,
            0
          ).setDepth(depth);

          const glow = this.add.rectangle(
            centerX,
            centerY,
            modalWidth + 40,
            modalHeight + 40,
            accent,
            0
          ).setDepth(depth + 1).setScale(0.88);

          const shadow = this.add.rectangle(
            centerX + 8,
            centerY + 10,
            modalWidth,
            modalHeight,
            0x000000,
            0
          ).setDepth(depth + 2).setScale(0.88);

          const modal = this.add.rectangle(
            centerX,
            centerY,
            modalWidth,
            modalHeight,
            panelColor,
            0.98
          )
            .setStrokeStyle(3, accent)
            .setDepth(depth + 3)
            .setScale(0.88)
            .setAlpha(0);

          const accentBar = this.add.rectangle(
            centerX,
            centerY - (modalHeight / 2) + 26,
            460,
            8,
            accent,
            1
          ).setDepth(depth + 4).setScale(0.88).setAlpha(0);

          let nameText = null;
          if (hasName) {
            nameText = this.add.text(
              centerX,
              centerY - 102,
              name,
              {
                fontSize: '24px',
                color: '#cbd5e1',
                fontStyle: 'bold',
                align: 'center'
              }
            ).setOrigin(0.5).setDepth(depth + 4).setAlpha(0);
          }

          const titleY = hasName ? centerY - 52 : centerY - 44;

          const titleText = this.add.text(
            centerX,
            titleY,
            title,
            {
              fontSize: '34px',
              color: textColor,
              fontStyle: 'bold',
              align: 'center',
              wordWrap: { width: 500 }
            }
          ).setOrigin(0.5).setDepth(depth + 4).setAlpha(0);

          let messageText = null;
          if (hasMessage) {
            messageText = this.add.text(
              centerX,
              centerY + 10,
              message,
              {
                fontSize: '22px',
                color: '#e5e7eb',
                align: 'center',
                wordWrap: { width: 460 }
              }
            ).setOrigin(0.5).setDepth(depth + 4).setAlpha(0);
          }

          const emojiY = hasMessage ? centerY + 94 : centerY + 56;

          const emojiText = this.add.text(
            centerX,
            emojiY,
            emoji,
            {
              fontSize: '100px'
            }
          ).setOrigin(0.5).setDepth(depth + 5).setAlpha(0).setScale(0.7);

          const progressBg = this.add.rectangle(
            centerX - 170,
            centerY + (modalHeight / 2) - 26,
            340,
            8,
            0x334155,
            0.9
          ).setOrigin(0, 0.5).setDepth(depth + 4).setAlpha(0);

          const progressFill = this.add.rectangle(
            centerX - 170,
            centerY + (modalHeight / 2) - 26,
            340,
            8,
            accent,
            1
          ).setOrigin(0, 0.5).setDepth(depth + 5).setAlpha(0);

          this.tweens.add({
            targets: overlay,
            alpha: 0.68,
            duration: 180
          });

          this.tweens.add({
            targets: [glow, shadow],
            alpha: { from: 0, to: [0.12, 0.24] },
            scaleX: 1,
            scaleY: 1,
            duration: 220,
            ease: 'Back.easeOut'
          });

          this.tweens.add({
            targets: [modal, accentBar],
            alpha: 1,
            scaleX: 1,
            scaleY: 1,
            duration: 240,
            ease: 'Back.easeOut'
          });

          const fadeTargets = [titleText, progressBg, progressFill];
          if (nameText) fadeTargets.push(nameText);
          if (messageText) fadeTargets.push(messageText);

          this.tweens.add({
            targets: fadeTargets,
            alpha: 1,
            y: '-=6',
            duration: 260,
            ease: 'Sine.easeOut',
            delay: 80
          });

          this.tweens.add({
            targets: emojiText,
            alpha: 1,
            scaleX: 1,
            scaleY: 1,
            duration: 300,
            ease: 'Back.easeOut',
            delay: 100
          });

          const pulseTween = this.tweens.add({
            targets: [emojiText, glow],
            scaleX: '+=0.03',
            scaleY: '+=0.03',
            alpha: { from: 1, to: 0.9 },
            duration: 420,
            yoyo: true,
            repeat: -1
          });

          const progressTween = this.tweens.add({
            targets: progressFill,
            scaleX: 0,
            duration,
            ease: 'Linear'
          });

          if (shake) {
            this.tweens.add({
              targets: [modal, shadow, titleText],
              x: '+=6',
              duration: 55,
              yoyo: true,
              repeat: 5,
              delay: 260
            });
          }

          const close = () => {
            pulseTween.stop();
            progressTween.stop();

            const destroyTargets = [
              overlay,
              glow,
              shadow,
              modal,
              accentBar,
              titleText,
              emojiText,
              progressBg,
              progressFill
            ];

            if (nameText) destroyTargets.push(nameText);
            if (messageText) destroyTargets.push(messageText);

            this.tweens.add({
              targets: destroyTargets,
              alpha: 0,
              scaleX: 0.92,
              scaleY: 0.92,
              duration: 180,
              ease: 'Sine.easeIn',
              onComplete: () => {
                overlay.destroy();
                glow.destroy();
                shadow.destroy();
                modal.destroy();
                accentBar.destroy();
                if (nameText) nameText.destroy();
                titleText.destroy();
                if (messageText) messageText.destroy();
                emojiText.destroy();
                progressBg.destroy();
                progressFill.destroy();
                this.isSuspenseModalOpen = false;
                resolve();
              }
            });
          };

          this.time.delayedCall(duration, close);
        });
      }


      stopManagedSound(soundInstance) {
        if (!soundInstance) return;

        try {
          if (soundInstance.isPlaying) soundInstance.stop();
        } catch (error) {
          console.warn('Falha ao parar áudio gerenciado:', error);
        }

        try {
          soundInstance.destroy();
        } catch (error) {
          console.warn('Falha ao destruir áudio gerenciado:', error);
        }
      }

      mapChargeProgress(rawProgress) {
        const clamped = Phaser.Math.Clamp(rawProgress, 0, 1);

        if (clamped <= 0.58) {
          return (clamped / 0.58) * 0.7;
        }

        if (clamped <= 0.82) {
          return 0.7 + ((clamped - 0.58) / 0.24) * 0.15;
        }

        return 0.85 + ((clamped - 0.82) / 0.18) * 0.15;
      }

      getForceZoneMeta(forceRatio) {
        const force = Phaser.Math.Clamp(forceRatio, 0, 1);
        const zones = [
          {
            max: 0.10,
            label: 'Muito fraco',
            color: 0x7f1d1d,
            description: 'Maior chance de 1 e 2.',
            weights: [38, 28, 16, 9, 6, 3]
          },
          {
            max: 0.25,
            label: 'Fraco',
            color: 0xc2410c,
            description: 'Favorece 1, 2 e 3.',
            weights: [24, 24, 20, 15, 10, 7]
          },
          {
            max: 0.45,
            label: 'Controle baixo',
            color: 0xd97706,
            description: 'Mais seguro, porém conservador.',
            weights: [13, 18, 24, 20, 15, 10]
          },
          {
            max: 0.65,
            label: 'Zona ideal',
            color: 0x22c55e,
            description: 'Melhor equilíbrio entre controle e impulso.',
            weights: [10, 14, 20, 22, 20, 14]
          },
          {
            max: 0.85,
            label: 'Forte',
            color: 0xf59e0b,
            description: 'Aumenta a chance de 4, 5 e 6.',
            weights: [6, 8, 12, 18, 24, 32]
          },
          {
            max: 1,
            label: 'Sobrecarga',
            color: 0xef4444,
            description: 'Muito 5 e 6, mas ainda pode dar erro bruto.',
            weights: [12, 4, 6, 10, 24, 44]
          }
        ];

        return zones.find((zone) => force <= zone.max) || zones[zones.length - 1];
      }

      getWeightedDiceValue(weights) {
        const total = weights.reduce((sum, weight) => sum + weight, 0);
        let roll = Math.random() * total;

        for (let i = 0; i < weights.length; i++) {
          roll -= weights[i];
          if (roll <= 0) return i + 1;
        }

        return 6;
      }

      showDiceTurnModal(playerName) {
        return new Promise((resolve) => {
          this.isDiceModalOpen = true;

          const overlay = this.add.rectangle(
            this.gameWidth / 2,
            this.gameHeight / 2,
            this.gameWidth,
            this.gameHeight,
            0x000000,
            0.78
          ).setDepth(1500);

          const modalWidth = 700;
          const modalHeight = 500;
          const modalCenterX = this.gameWidth / 2;
          const modalCenterY = this.gameHeight / 2;
          const barWidth = 450;
          const barHeight = 28;

          const shadow = this.add.rectangle(
            modalCenterX + 8,
            modalCenterY + 10,
            modalWidth,
            modalHeight,
            0x000000,
            0.28
          ).setDepth(1501);

          const modal = this.add.rectangle(
            modalCenterX,
            modalCenterY,
            modalWidth,
            modalHeight,
            0x0f172a,
            0.98
          )
            .setStrokeStyle(3, 0x334155)
            .setDepth(1502);

          const title = this.add.text(
            modalCenterX,
            modalCenterY - 190,
            `${playerName}, segure ESPAÇO`,
            {
              fontSize: '32px',
              color: '#f8fafc',
              fontStyle: 'bold',
              align: 'center',
              wordWrap: { width: 560 }
            }
          ).setOrigin(0.5).setDepth(1503);

          const subtitle = this.add.text(
            modalCenterX,
            modalCenterY - 146,
            'Segure para carregar. Solte no momento certo.',
            {
              fontSize: '18px',
              color: '#cbd5e1',
              align: 'center'
            }
          ).setOrigin(0.5).setDepth(1503);

          const diceSize = 132;

          const diceGlow = this.add.rectangle(
            modalCenterX,
            modalCenterY - 34,
            diceSize + 26,
            diceSize + 26,
            0xf59e0b,
            0.08
          ).setDepth(1502);

          const diceBox = this.add.rectangle(
            modalCenterX,
            modalCenterY - 34,
            diceSize,
            diceSize,
            0xffffff,
            1
          )
            .setStrokeStyle(3, 0x0f172a)
            .setDepth(1503);

          const diceText = this.add.text(
            modalCenterX,
            modalCenterY - 34,
            '-',
            {
              fontSize: '60px',
              color: '#111111',
              fontStyle: 'bold'
            }
          ).setOrigin(0.5).setDepth(1504);

          const barY = modalCenterY + 110;
          const barX = modalCenterX - (barWidth / 2);

          const forceLabel = this.add.text(
            modalCenterX,
            barY - 60,
            'Aguardando carga',
            {
              fontSize: '22px',
              color: '#f8fafc',
              fontStyle: 'bold'
            }
          ).setOrigin(0.5).setDepth(1503);

          const chanceText = this.add.text(
            modalCenterX,
            barY - 30,
            'A força altera a chance dos números do dado.',
            {
              fontSize: '16px',
              color: '#94a3b8',
              align: 'center'
            }
          ).setOrigin(0.5).setDepth(1503);

          const forceBarBg = this.add.rectangle(
            barX,
            barY,
            barWidth,
            barHeight,
            0x111827,
            1
          )
            .setOrigin(0, 0.5)
            .setStrokeStyle(2, 0x334155)
            .setDepth(1503);

          const dividerPositions = [0.10, 0.25, 0.45, 0.65, 0.85];
          const dividers = dividerPositions.map((ratio) => this.add.rectangle(
            barX + (barWidth * ratio),
            barY,
            2,
            barHeight + 10,
            0x475569,
            0.85
          ).setDepth(1504));

          const forceGlow = this.add.rectangle(
            barX,
            barY,
            0,
            barHeight + 14,
            0xf59e0b,
            0.18
          ).setOrigin(0, 0.5).setDepth(1504);

          const forceFill = this.add.rectangle(
            barX,
            barY,
            0,
            barHeight,
            0xf59e0b,
            1
          ).setOrigin(0, 0.5).setDepth(1505);

          const forceCap = this.add.circle(
            barX,
            barY,
            10,
            0xffffff,
            1
          ).setStrokeStyle(3, 0x0f172a).setDepth(1506);

          const overloadText = this.add.text(
            modalCenterX,
            barY + 60,
            'SOBRECARGA',
            {
              fontSize: '18px',
              color: '#fca5a5',
              fontStyle: 'bold',
              letterSpacing: 3
            }
          ).setOrigin(0.5).setDepth(1503).setAlpha(0);

          const bottomHint = this.add.text(
            modalCenterX,
            modalCenterY + 185,
            'Centro = mais controle. Extremos = mais risco.',
            {
              fontSize: '18px',
              color: '#e2e8f0',

          const keyHint = this.add.text(
            modalCenterX,
            modalCenterY + 225,
            'Pressione e segure ESPAÇO',
            {
              fontSize: '20px',
              color: '#fbbf24',
              fontStyle: 'bold'
            }
          ).setOrigin(0.5).setDepth(1503);

          const chargeState = { raw: 0 };
          let chargeProgress = 0;
          let isCharging = false;
          let hasReleased = false;
          let chargeTween = null;
          let previewEvent = null;
          let loadingSound = null;
          let overloadTween = null;
          let closed = false;

          const pulseKeyTween = this.tweens.add({
            targets: keyHint,
            alpha: 0.45,
            duration: 500,
            yoyo: true,
            repeat: -1
          });

          const pulseGlowTween = this.tweens.add({
            targets: diceGlow,
            alpha: 0.16,
            scaleX: 1.05,
            scaleY: 1.05,
            duration: 420,
            yoyo: true,
            repeat: -1
          });

          const setDiceVisual = (value, animated = false) => {
            const isEven = value % 2 === 0;
            diceBox.setFillStyle(isEven ? 0xffffff : 0xdbe4f0, 1);
            diceText.setText(String(value));
            diceText.setColor('#111111');

            if (animated) {
              this.tweens.add({
                targets: [diceBox, diceText],
                scaleX: 1.08,
                scaleY: 1.08,
                angle: Phaser.Math.Between(-5, 5),
                duration: 80,
                yoyo: true
              });
            }
          };

          const updateChargeVisual = (progress) => {
            const zone = this.getForceZoneMeta(progress);
            const width = barWidth * progress;
            const safeWidth = progress > 0 ? Math.max(width, 10) : 0;
            const capX = barX + width;
            const inOverload = progress >= 0.86;

            forceFill.width = safeWidth;
            forceGlow.width = safeWidth;
            forceFill.setFillStyle(zone.color, 1);
            forceGlow.setFillStyle(zone.color, inOverload ? 0.32 : 0.18);
            forceCap.setPosition(Phaser.Math.Clamp(capX, barX, barX + barWidth), barY);
            forceCap.setFillStyle(inOverload ? 0xfca5a5 : 0xffffff, 1);
            forceLabel.setText(`${zone.label} · ${Math.round(progress * 100)}%`);
            chanceText.setText(zone.description);
            diceGlow.setFillStyle(zone.color, inOverload ? 0.18 : 0.08);

            if (inOverload) {
              overloadText.setAlpha(1);
              modal.setStrokeStyle(3, 0xef4444);
              subtitle.setColor('#fecaca');

              if (!overloadTween) {
                overloadTween = this.tweens.add({
                  targets: [modal, overloadText, forceCap],
                  x: '+=4',
                  duration: 45,
                  yoyo: true,
                  repeat: -1
                });
              }
            } else {
              overloadText.setAlpha(0);
              modal.setStrokeStyle(3, 0x334155);
              subtitle.setColor('#cbd5e1');

              if (overloadTween) {
                overloadTween.stop();
                overloadTween = null;
                modal.x = modalCenterX;
                overloadText.x = modalCenterX;
                forceCap.x = Phaser.Math.Clamp(capX, barX, barX + barWidth);
              }
            }
          };

          const cleanupRuntime = () => {
            if (chargeTween) {
              chargeTween.stop();
              chargeTween = null;
            }

            if (previewEvent) {
              previewEvent.remove(false);
              previewEvent = null;
            }

            if (overloadTween) {
              overloadTween.stop();
              overloadTween = null;
            }

            modal.x = modalCenterX;
            overloadText.x = modalCenterX;
            forceCap.y = barY;

            pulseKeyTween.stop();
            pulseGlowTween.stop();
            this.stopManagedSound(loadingSound);
            loadingSound = null;
          };

          const destroyModal = () => {
            if (closed) return;
            closed = true;

            cleanupRuntime();
            this.input.keyboard?.off('keydown-SPACE', handleKeyDown);
            this.input.keyboard?.off('keyup-SPACE', handleKeyUp);

            [
              overlay,
              shadow,
              modal,
              title,
              subtitle,
              diceGlow,
              diceBox,
              diceText,
              forceLabel,
              chanceText,
              forceBarBg,
              forceGlow,
              forceFill,
              forceCap,
              overloadText,
              bottomHint,
              keyHint,
              ...dividers
            ].forEach((item) => item.destroy());

            this.isDiceModalOpen = false;
          };

          const animateFinalRoll = (finalValue, zone) => {
            return new Promise((rollResolve) => {
              let count = 0;
              const event = this.time.addEvent({
                delay: 72,
                repeat: 11,
                callback: () => {
                  const tempValue = Phaser.Math.Between(1, 6);
                  setDiceVisual(tempValue, true);
                  count++;

                  if (count >= 12) {
                    event.remove(false);
                    setDiceVisual(finalValue, false);
                    subtitle.setText(`Força travada em ${zone.label.toLowerCase()}. Resultado pronto.`);
                    subtitle.setColor('#e2e8f0');

                    this.tweens.add({
                      targets: [diceBox, diceText],
                      scaleX: 1.16,
                      scaleY: 1.16,
                      angle: 0,
                      duration: 110,
                      yoyo: true,
                      onComplete: () => {
                        this.time.delayedCall(260, () => {
                          destroyModal();
                          rollResolve(finalValue);
                        });
                      }
                    });
                  }
                }
              });
            });
          };

          const beginCharge = () => {
            if (hasReleased || isCharging) return;

            isCharging = true;
            subtitle.setText('Carregando... solte ESPAÇO para lançar');
            keyHint.setText('Solte ESPAÇO no ponto desejado');
            keyHint.setColor('#fde68a');

            if (this.cache.audio.exists('loading')) {
              try {
                loadingSound = this.sound.add('loading', { loop: true, volume: 0.55 });
                loadingSound.play();
              } catch (error) {
                console.warn('Falha ao iniciar áudio de carregamento:', error);
              }
            }

            previewEvent = this.time.addEvent({
              delay: 80,
              loop: true,
              callback: () => {
                const previewValue = Phaser.Math.Between(1, 6);
                setDiceVisual(previewValue, true);
              }
            });

            chargeTween = this.tweens.add({
              targets: chargeState,
              raw: 1,
              duration: 1500,
              ease: 'Linear',
              onUpdate: () => {
                chargeProgress = this.mapChargeProgress(chargeState.raw);
                updateChargeVisual(chargeProgress);
              },
              onComplete: () => {
                chargeProgress = 1;
                updateChargeVisual(chargeProgress);
              }
            });
          };

          const releaseCharge = async () => {
            if (!isCharging || hasReleased) return;

            hasReleased = true;
            isCharging = false;
            subtitle.setText('Lançando dado...');
            keyHint.setText('Lançamento executado');
            keyHint.setColor('#86efac');

            cleanupRuntime();
            this.playSound('dice_roll');

            const zone = this.getForceZoneMeta(chargeProgress);
            const finalValue = this.getWeightedDiceValue(zone.weights);
            const result = await animateFinalRoll(finalValue, zone);
            resolve(result);
          };

          const handleKeyDown = (event) => {
            event.preventDefault();
            if (event.repeat) return;
            beginCharge();
          };

          const handleKeyUp = (event) => {
            event.preventDefault();
            releaseCharge();
          };

          this.input.keyboard?.on('keydown-SPACE', handleKeyDown);
          this.input.keyboard?.on('keyup-SPACE', handleKeyUp);

          updateChargeVisual(0);
        });
      }

      getPathGridPosition(posicao) {
        if (posicao >= 1 && posicao <= 10) return { col: posicao - 1, row: 0 };
        if (posicao === 11) return { col: 9, row: 1 };

        if (posicao >= 12 && posicao <= 21) return { col: 21 - posicao, row: 2 };
        if (posicao === 22) return { col: 0, row: 3 };

        if (posicao >= 23 && posicao <= 32) return { col: posicao - 23, row: 4 };
        if (posicao === 33) return { col: 9, row: 5 };

        if (posicao >= 34 && posicao <= 43) return { col: 43 - posicao, row: 6 };
        if (posicao === 44) return { col: 0, row: 7 };

        if (posicao >= 45 && posicao <= 54) return { col: posicao - 45, row: 8 };

        return { col: 0, row: 0 };
      }

      getCellTopLeft(posicao) {
        const { col, row } = this.getPathGridPosition(posicao);
        const x = this.boardStartX + col * (this.cellSize + this.cellGap);
        const y = this.boardStartY + row * (this.cellSize + this.cellGap);
        return { x, y };
      }

      createRoundedBoardCell(x, y, width, height, fillColor, fillAlpha = 1, strokeColor = 0x1f2937, radius = 8) {
        const shape = this.add.graphics({ x, y });
        shape.widthValue = width;
        shape.heightValue = height;
        shape.fillColorValue = fillColor;
        shape.fillAlphaValue = fillAlpha;
        shape.strokeColorValue = strokeColor;
        shape.radiusValue = radius;

        shape.redraw = (nextFillColor = shape.fillColorValue, nextFillAlpha = shape.fillAlphaValue) => {
          shape.fillColorValue = nextFillColor;
          shape.fillAlphaValue = nextFillAlpha;
          shape.clear();
          shape.lineStyle(2, shape.strokeColorValue, 1);
          shape.fillStyle(shape.fillColorValue, shape.fillAlphaValue);
          shape.fillRoundedRect(-shape.widthValue / 2, -shape.heightValue / 2, shape.widthValue, shape.heightValue, shape.radiusValue);
          shape.strokeRoundedRect(-shape.widthValue / 2, -shape.heightValue / 2, shape.widthValue, shape.heightValue, shape.radiusValue);
          return shape;
        };

        return shape.redraw();
      }

      drawBoard() {
        for (let pos = 1; pos <= this.totalCasas; pos++) {
          const { x, y } = this.getCellTopLeft(pos);
          const isBomb = this.bombas.includes(pos);
          const isQuestion = this.questionHouses.includes(pos);

          let bgColor = 0xe5e7eb;
          if (isBomb) bgColor = 0xfca5a5;
          if (isQuestion) bgColor = 0xfde68a;

          const cell = this.createRoundedBoardCell(
            x + this.cellSize / 2,
            y + this.cellSize / 2,
            this.cellSize,
            this.cellSize,
            bgColor,
            1,
            0x1f2937,
            8
          );

          const stormOverlay = this.createRoundedBoardCell(
            x + this.cellSize / 2,
            y + this.cellSize / 2,
            this.cellSize,
            this.cellSize,
            0x000000,
            0,
            0x0f172a,
            8
          );

          this.boardCells[pos] = cell;
          this.stormOverlays[pos] = stormOverlay;

          if (isBomb) {
            const icon = this.add.text(x + this.cellSize / 2, y + this.cellSize / 2, '💣', {
              fontSize: '28px'
            }).setOrigin(0.5);

            this.boardIcons[pos] = icon;
          } else if (isQuestion) {
            const icon = this.add.text(x + this.cellSize / 2, y + this.cellSize / 2, '❓', {
              fontSize: '28px',
              color: '#b91c1c',
              fontStyle: 'bold'
            }).setOrigin(0.5);

            this.boardIcons[pos] = icon;
          } else {
            this.boardTexts[pos] = this.add.text(
              x + this.cellSize / 2,
              y + this.cellSize / 2,
              String(pos),
              {
                fontSize: '20px',
                color: '#111827',
                fontStyle: 'bold'
              }
            ).setOrigin(0.5);
          }
        }

        const start = this.getCellTopLeft(1);
        const end = this.getCellTopLeft(this.totalCasas);

        this.add.text(start.x, start.y - 38, 'INÍCIO', {
          fontSize: '20px',
          color: '#ffffff',
          fontStyle: 'bold'
        });

        this.add.text(end.x + 20, end.y + 92, 'FIM', {
          fontSize: '20px',
          color: '#ffffff',
          fontStyle: 'bold'
        });
      }

      getTokenPosition(posicao, playerIndex) {
        const { x, y } = this.getCellTopLeft(posicao);

        const offsetMap = [
          { x: -14, y: -14 },

        return {

      syncRollButtonState() {

        if (this.gameOver) {
          this.disableRollButton('Fim de jogo');
          return;
        }

        if (this.isPlayerSetupOpen || this.isQuestionOpen || this.isEndModalOpen || this.isDiceModalOpen || this.isSuspenseModalOpen) {

          return;
        }

        if (this.isAnimating) {

          return;

        const current = this.players[this.currentPlayer];
        if (current && current.enabled && current.alive) {
          this.enableRollButton(current.nome);

          this.disableRollButton('Aguarde');
        }

      advanceToNextAlivePlayer() {
        if (this.gameOver) return;

        let attempts = 0;
        do {
          this.currentPlayer = (this.currentPlayer + 1) % this.maxPlayers;
          attempts++;
        } while (
          attempts <= this.maxPlayers &&
          (!this.players[this.currentPlayer].enabled || !this.players[this.currentPlayer].alive)
        );
      }

      async startTurn() {
        if (
          this.gameOver ||
          this.isAnimating ||
          this.isQuestionOpen ||
          this.isPlayerSetupOpen ||
          this.isEndModalOpen ||
          this.isDiceModalOpen ||
          this.isSuspenseModalOpen
        ) return;

        const player = this.players[this.currentPlayer];

        if (!player.enabled || !player.alive) {
          this.advanceToNextAlivePlayer();
          this.updateHeaderNames();
          this.enableRollButton(this.players[this.currentPlayer].nome);
          return;
        }

        this.isAnimating = true;
        this.disableRollButton(player.nome);
        this.infoText.setText(`${player.nome}, segure ESPAÇO e solte para lançar o dado.`);

        const dice = await this.showDiceTurnModal(player.nome);

        this.infoText.setText(`${player.nome} tirou ${dice}. Movendo...`);
        this.playSound('token_move');
        await this.movePlayerStepByStep(player, this.currentPlayer, dice);

        if (this.gameOver || !player.alive) return;

        if (this.isStormHouse(player.posicao)) {
          this.handleStormDefeat(
            player,
            `${player.nome} caiu em uma casa já consumida pela tempestade.`
          );
          return;
        }

        await this.showSuspenseModal(
          this.getPlayerTurnFeedback(player.nome, dice, player.posicao)
        );

        if (this.gameOver || !player.alive) return;

        if (player.posicao >= this.totalCasas) {
          this.handleVictory(player);
          return;
        }

        if (this.isBombHouse(player.posicao)) {
          await this.handleBomb(player, this.currentPlayer);
        } else if (this.isQuestionHouse(player.posicao)) {
          await this.handleQuestionHouse(player, this.currentPlayer);
        }

        if (this.gameOver || !player.alive) return;

        if (player.posicao >= this.totalCasas) {
          this.handleVictory(player);
          return;
        }

        if (this.isStormHouse(player.posicao)) {
          this.handleStormDefeat(
            player,
            `${player.nome} terminou o turno em uma casa já consumida pela tempestade.`
          );
          return;
        }

        this.turnCount++;

        const totalEnabled = this.getEnabledPlayers().length;
        if (totalEnabled > 0 && this.turnCount % totalEnabled === 0) {
          this.roundCount++;

          if (this.roundCount >= 2) {
            this.disableRollButton('Tempestade');

            const stormDice = await this.showStormDiceModal();
            this.infoText.setText(`A tempestade avançará ${stormDice} casa(s)!`);

            await this.advanceStormBy(stormDice);

            if (this.gameOver) return;

            await this.showSuspenseModal(
              this.getStormTurnFeedback(stormDice)
            );

            if (this.gameOver) return;
          }
        }

        this.advanceToNextAlivePlayer();
        this.statusText.setText(`Vez de: ${this.players[this.currentPlayer].nome}`);
        this.infoText.setText('Clique no botão laranja e use ESPAÇO para carregar o dado.');

        this.isAnimating = false;
        this.enableRollButton(this.players[this.currentPlayer].nome);
      }

      showStormDiceModal() {
        return new Promise((resolve) => {
          this.isDiceModalOpen = true;

          const modalCenterX = this.gameWidth / 2;
          const modalCenterY = this.gameHeight / 2;
          const modalWidth = 600;
          const modalHeight = 420;

          const overlay = this.add.rectangle(

          ).setDepth(1600);

          const shadow = this.add.rectangle(

          ).setDepth(1601);

          const modal = this.add.rectangle(

          )
            .setStrokeStyle(3, 0x7f1d1d)
            .setDepth(1602);

          const title = this.add.text(
            modalCenterX,
            modalCenterY - 140,

              fontSize: '34px',

              fontStyle: 'bold',

            }
          ).setOrigin(0.5).setDepth(1603);

          const subtitle = this.add.text(

            {

            }
          ).setOrigin(0.5).setDepth(1603);

          )
            .setStrokeStyle(3, 0x450a0a)

            {

              fontStyle: 'bold'
            }
          ).setOrigin(0.5).setDepth(1604);

          const glow = this.add.rectangle(
            modalCenterX,
            modalCenterY + 6,
            diceSize + 20,
            diceSize + 20,
            0x7f1d1d,
            0.08
          ).setDepth(1602);

          const setDiceVisual = (value) => {
            const isEven = value % 2 === 0;
            diceBox.setFillStyle(isEven ? 0xffffff : 0xd1d5db, 1);
            diceText.setText(String(value));
            diceText.setColor('#111111');
          };

          const destroyModal = () => {
            overlay.destroy();
            shadow.destroy();
            modal.destroy();
            title.destroy();
            subtitle.destroy();
            glow.destroy();
            diceBox.destroy();
            diceText.destroy();
            this.isDiceModalOpen = false;

          let count = 0;

          this.tweens.add({
            targets: title,
            alpha: 0.72,

            yoyo: true,
            repeat: -1

          this.tweens.add({
            targets: glow,
            alpha: 0.18,
            scaleX: 1.08,
            scaleY: 1.08,
            duration: 480,
            yoyo: true,
            repeat: -1
          });

          const event = this.time.addEvent({
            delay: 95,
            repeat: 11,
            callback: () => {
              const tempValue = Phaser.Math.Between(1, 6);
              setDiceVisual(tempValue);

              this.tweens.add({
                targets: [diceBox, diceText],
                scaleX: 1.1,
                scaleY: 1.1,
                angle: Phaser.Math.Between(-6, 6),
                duration: 90,
                yoyo: true
              });

              count++;

              if (count >= 12) {
                event.remove(false);

                const finalValue = Phaser.Math.Between(1, 6);
                setDiceVisual(finalValue);

                this.tweens.add({
                  targets: [diceBox, diceText],
                  scaleX: 1.16,
                  scaleY: 1.16,
                  angle: 0,
                  duration: 120,
                  yoyo: true,
                  onComplete: () => {
                    this.time.delayedCall(450, () => {
                      destroyModal();
                      resolve(finalValue);
                    });
                  }
                });
              }
            }
          });
        });

      handleVictory(player) {
        this.gameOver = true;
        this.isAnimating = false;
        this.isQuestionOpen = false;

        const others = this.getEnabledPlayers().filter((p) => p !== player).map((p) => p.nome).join(', ');
        this.statusText.setText(`${player.nome} venceu!`);
        this.infoText.setText('Fim de jogo.');
        this.disableRollButton();

        this.playSound('win_fanfare');
        this.tweens.add({
          targets: player.token,
          scale: 1.35,
          duration: 450,
          yoyo: true,
          repeat: 5
        });

        this.showEndModal({
          title: 'Parabéns!',
          winnerName: player.nome,
          message: others
            ? `${player.nome} chegou ao fim da pista e venceu a partida contra ${others}.`
            : `${player.nome} venceu a partida.`
        });
      }

      handleStormVictory(winner, loserName, reason = '') {
        this.gameOver = true;
        this.isAnimating = false;
        this.isQuestionOpen = false;

        const losers = loserName
          .split(',')
          .map((name) => name.trim())
          .filter(Boolean);
        const loserLabel = losers.join(', ');
        const stormMessage = losers.length > 1
          ? `${winner.nome} venceu porque ${loserLabel} foram engolidos pela tempestade.`
          : `${winner.nome} venceu porque ${loserLabel} foi engolido pela tempestade.`;

        this.statusText.setText(`${winner.nome} venceu!`);
        this.infoText.setText(reason || stormMessage);
        this.disableRollButton();
        this.playSound('win_fanfare');

        this.tweens.add({
          targets: winner.token,
          scale: 1.35,
          duration: 450,
          yoyo: true,
          repeat: 5
        });

        this.showEndModal({
          title: 'Parabéns!',
          winnerName: winner.nome,
          message: stormMessage
        });
      }

      handleStormDefeat(loserPlayer, reason, options = { checkEndGame: true }) {
        if (!loserPlayer.alive) return;

        loserPlayer.alive = false;
        loserPlayer.token.setAlpha(0.25);
        loserPlayer.token.setScale(0.8);

        this.updateHeaderNames();

        this.tweens.add({
          targets: loserPlayer.token,
          alpha: 0.15,
          scale: 0.6,
          duration: 450,
          yoyo: true,
          repeat: 3
        });

        if (!options.checkEndGame) {
          this.playSound('player_eliminated');
          this.infoText.setText(`${loserPlayer.nome} foi eliminado. ${reason}`);
          return;
        }

        const alivePlayers = this.getAlivePlayers();

        if (alivePlayers.length === 1) {
          const winner = alivePlayers[0];
          this.handleStormVictory(winner, loserPlayer.nome, reason);
          return;
        }

        if (alivePlayers.length === 0) {
          this.gameOver = true;
          this.isAnimating = false;
          this.isQuestionOpen = false;
          this.statusText.setText('Sem vencedores');
          this.infoText.setText('Todos os jogadores foram eliminados.');
          this.disableRollButton();

          this.showEndModal({
            title: 'Fim de jogo',
            winnerName: 'Sem vencedor',
            message: 'Todos os jogadores foram eliminados pela tempestade.'
          });

          return;
        }

        this.isAnimating = false;
        this.infoText.setText(`${loserPlayer.nome} foi eliminado. ${reason}`);
        this.advanceToNextAlivePlayer();
        this.statusText.setText(`Vez de: ${this.players[this.currentPlayer].nome}`);
        this.enableRollButton(this.players[this.currentPlayer].nome);
      }

      isBombHouse(posicao) {
        return this.bombas.includes(posicao);
      }

      isQuestionHouse(posicao) {
        return this.questionHouses.includes(posicao);
      }

      isStormHouse(posicao) {
        return this.stormPosition > 0 && posicao <= this.stormPosition;
      }

      async movePlayerStepByStep(player, playerIndex, dice) {
        const destinoFinal = Math.min(player.posicao + dice, this.totalCasas);

        while (player.posicao < destinoFinal) {
          player.posicao++;
          await this.moveTokenToPosition(player.token, player.posicao, playerIndex);

          if (this.isStormHouse(player.posicao)) {
            this.handleStormDefeat(
              player,
              `${player.nome} entrou em uma casa consumida pela tempestade durante o movimento.`
            );
            return;
          }
        }
      }

      moveTokenToPosition(token, posicao, playerIndex) {
        return new Promise((resolve) => {
          const target = this.getTokenPosition(posicao, playerIndex);

          this.tweens.add({
            targets: token,
            x: target.x,
            y: target.y,
            duration: 480,
            ease: 'Sine.easeInOut',
            onComplete: () => resolve()
          });
        });
      }

      async handleBomb(player, playerIndex) {
        const casaAtual = player.posicao;
        const novaPosicao = Math.max(1, player.posicao - 3);

        this.infoText.setText(
          `${player.nome} caiu na bomba da casa ${casaAtual} e voltou 3 casas!`
        );
        this.playSound('bomb_explosion');

        await this.flashSpecialHouse(casaAtual);
        await this.shakeToken(player.token);

        while (player.posicao > novaPosicao) {
          player.posicao--;
          await this.moveTokenToPosition(player.token, player.posicao, playerIndex);

          if (this.isStormHouse(player.posicao)) {
            this.handleStormDefeat(
              player,
              `${player.nome} recuou para uma casa já consumida pela tempestade após cair na bomba.`
            );
            return;
          }
        }
      }

      async handleQuestionHouse(player, playerIndex) {
        const casa = player.posicao;
        this.infoText.setText(`${player.nome} caiu na casa de pergunta ${casa}.`);

        await this.flashSpecialHouse(casa);

        const question = this.getRandomQuestion();
        const isCorrect = await this.showQuestionModal(question);

        if (this.gameOver || !player.alive) return;

        if (isCorrect) {
          this.infoText.setText(`${player.nome} acertou e avançou 1 casa!`);
          this.playSound('correct_answer');
          player.posicao += 1;
          await this.moveTokenToPosition(player.token, player.posicao, playerIndex);

          if (this.isStormHouse(player.posicao)) {
            this.handleStormDefeat(
              player,
              `${player.nome} avançou para uma casa já consumida pela tempestade após acertar a pergunta.`
            );
            return;
          }
        } else {
          this.infoText.setText(`${player.nome} errou e voltou 1 casa.`);

          if (player.posicao > 1) {
            player.posicao -= 1;
            await this.moveTokenToPosition(player.token, player.posicao, playerIndex);

            if (this.isStormHouse(player.posicao)) {
              this.handleStormDefeat(
                player,
                `${player.nome} recuou para uma casa já consumida pela tempestade após errar a pergunta.`
              );
              return;
            }
          }
        }
      }

      async advanceStormBy(steps) {
        for (let i = 0; i < steps; i++) {
          if (this.stormPosition >= this.totalCasas) return;

          this.stormPosition += 1;
          this.stormText.setText(`Tempestade: casas 1 até ${this.stormPosition} destruídas`);

          const cell = this.boardCells[this.stormPosition];
          const text = this.boardTexts[this.stormPosition];
          const icon = this.boardIcons[this.stormPosition];
          const overlay = this.stormOverlays[this.stormPosition];

          await new Promise((resolve) => {
            this.tweens.add({
              targets: overlay,
              alpha: 0.78,
              duration: 420,
              onComplete: () => resolve()
            });
          });

          this.playSound('storm_advance');
          cell.redraw(0x111111, 0.92);

          if (text) text.setColor('#d1d5db');

          if (icon) {
            icon.setColor('#d1d5db');
            icon.setAlpha(0.5);
          }

          await this.flashStormWarning(this.stormPosition);

          const alivePlayers = [...this.getAlivePlayers()];
          for (const player of alivePlayers) {
            if (player.posicao <= this.stormPosition) {
              this.playSound('storm_hit');
              this.handleStormDefeat(
                player,
                `${player.nome} foi alcançado pela tempestade quando ela destruiu a casa ${this.stormPosition}.`,
                { checkEndGame: false }
              );
            }
          }

          const survivors = this.getAlivePlayers();
          if (survivors.length === 1) {
            const winner = survivors[0];
            this.handleStormVictory(
              winner,
              alivePlayers.filter((player) => player !== winner).map((player) => player.nome).join(', ')
            );
            return;
          }

          if (survivors.length === 0) {
            this.gameOver = true;
            this.isAnimating = false;
            this.isQuestionOpen = false;
            this.statusText.setText('Sem vencedores');
            this.infoText.setText('Todos os jogadores foram eliminados pela tempestade.');
            this.disableRollButton();

            this.showEndModal({
              title: 'Fim de jogo',
              winnerName: 'Sem vencedor',
              message: 'A tempestade engoliu todos os jogadores. Todos perderam.'
            });
            return;
          }
        }
      }

      flashStormWarning(casa) {
        return new Promise((resolve) => {
          const overlay = this.stormOverlays[casa];

          this.tweens.add({
            targets: overlay,
            alpha: 0.45,
            duration: 90,
            yoyo: true,
            repeat: 2,
            onComplete: () => {
              overlay.alpha = 0;
              resolve();
            }
          });
        });
      }

      flashSpecialHouse(casa) {
        return new Promise((resolve) => {
          const cell = this.boardCells[casa];

          this.tweens.add({
            targets: cell,
            alpha: 0.25,
            scaleX: 1.08,
            scaleY: 1.08,
            duration: 110,
            yoyo: true,
            repeat: 4,
            onComplete: () => {
              cell.alpha = 1;
              cell.scaleX = 1;
              cell.scaleY = 1;
              resolve();
            }
          });
        });
      }

      shakeToken(token) {
        return new Promise((resolve) => {
          const originalX = token.x;

          this.tweens.add({
            targets: token,
            x: originalX + 10,
            duration: 45,
            yoyo: true,
            repeat: 5,
            onComplete: () => {
              token.x = originalX;
              resolve();
            }
          });
        });
      }

        return new Promise((resolve) => {
          this.isQuestionOpen = true;

          const overlay = this.add.rectangle(
            this.gameWidth / 2,

            this.gameWidth / 2,

          const title = this.add.text(this.gameWidth / 2, modalCenterY - 120, 'Pergunta', {
            fontSize: '34px',
            color: '#111827',
            fontStyle: 'bold'
          }).setOrigin(0.5).setDepth(1002);

          const questionText = this.add.text(this.gameWidth / 2, modalCenterY - 54, questionData.question, {
            fontSize: '28px',
            color: '#111827',
            align: 'center',
            wordWrap: { width: 640 }
          }).setOrigin(0.5).setDepth(1002);

          const buttons = [];
          const buttonTexts = [];

          const startY = modalCenterY + 34;
          const gapY = 58;

          questionData.options.forEach((option, index) => {
            const btnY = startY + index * gapY;

            const button = this.add.rectangle(
              this.gameWidth / 2,
              btnY,
              590,
              42,
              0xdbeafe,
              1
            )
              .setStrokeStyle(2, 0x1e3a8a)
              .setInteractive({ useHandCursor: true })
              .setDepth(1002);

            const buttonText = this.add.text(this.gameWidth / 2, btnY, option, {
              fontSize: '22px',

            }).setOrigin(0.5).setDepth(1003);

            button.on('pointerover', () => button.setFillStyle(0xbfdbfe));
            button.on('pointerout', () => button.setFillStyle(0xdbeafe));

            button.on('pointerdown', () => {
              buttons.forEach((b) => b.disableInteractive());

              const isCorrect = index === questionData.answer;
              button.setFillStyle(isCorrect ? 0x86efac : 0xfca5a5);

              this.time.delayedCall(500, () => {
                overlay.destroy();
                modal.destroy();
                title.destroy();
                questionText.destroy();
                buttons.forEach((b) => b.destroy());
                buttonTexts.forEach((t) => t.destroy());

                this.isQuestionOpen = false;
                resolve(isCorrect);

            buttonTexts.push(buttonText);

            <div style="display:flex; justify-content:center; margin-top:6px;">
              <button
                id="startPlayersButton"
                style="
                  min-width: 280px;
                  height: 58px;
                  padding: 0 24px;
                  border: 2px solid #14532d;
                  border-radius: 4px;
                  background: #86efac;
                  color: #111827;
                  font-size: 28px;
                  font-weight: 700;
                  cursor: pointer;
                "
              >
                Começar partida
              </button>
            </div>
          </div>
        `).setDepth(2003);

        const node = modalDom.node;
        const countSelect = node.querySelector('#playersCount');
        const errorNode = node.querySelector('#playerSetupError');
        const startBtn = node.querySelector('#startPlayersButton');
        const rows = Array.from(node.querySelectorAll('.player-row'));

        const applyPlayerCountVisibility = () => {
          const count = Number(countSelect.value);

          rows.forEach((row, index) => {
            row.style.display = index < count ? 'grid' : 'none';
          });
        };

        applyPlayerCountVisibility();

        countSelect.addEventListener('change', applyPlayerCountVisibility);

        const submit = () => {
          const count = Number(countSelect.value);
          const category = node.querySelector('#questionCategory').value;

          if (count < 2 || count > 4) {
            errorNode.textContent = 'A partida deve ter entre 2 e 4 jogadores.';
            return;
          }

          const names = [];
          for (let i = 1; i <= count; i++) {
            const input = node.querySelector(`#player${i}Name`);
            const name = (input.value || '').trim();

            if (!name) {
              errorNode.textContent = 'Todos os nomes dos jogadores ativos devem ser preenchidos.';
              return;
            }

            names.push(name);
          }

          this.selectedCategory = category;
          this.availableQuestions = [...this.questionPools[category]];
          this.activePlayersCount = count;

          for (let i = 0; i < this.maxPlayers; i++) {
            this.players[i].enabled = i < count;
            this.players[i].alive = i < count;
            this.players[i].posicao = 1;
            this.players[i].nome = i < count ? names[i] : `Jogador ${i + 1}`;
          }

          this.currentPlayer = 0;
          this.refreshPlayerTokensVisibility();

          for (let i = 0; i < this.maxPlayers; i++) {
            if (this.players[i].enabled) {
              const pos = this.getTokenPosition(1, i);
              this.players[i].token.setPosition(pos.x, pos.y);
              this.players[i].token.setAlpha(1);
              this.players[i].token.setScale(1);
            }
          }

          overlay.destroy();
          modalShadow.destroy();
          modalBg.destroy();
          modalDom.destroy();

          this.isPlayerSetupOpen = false;
          this.updateHeaderNames();
          this.infoText.setText('Clique no botão laranja e use ESPAÇO para lançar o dado.');
          this.enableRollButton(this.players[this.currentPlayer].nome);
        };

        startBtn.addEventListener('mouseenter', () => {
          startBtn.style.background = '#bbf7d0';
        });

        startBtn.addEventListener('mouseleave', () => {
          startBtn.style.background = '#86efac';
        });

        startBtn.addEventListener('click', () => {
          this.playSound('button_click');
          submit();
        });

        const firstInput = node.querySelector('#player1Name');
        const secondInput = node.querySelector('#player2Name');

        firstInput.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') secondInput.focus();
        });

        this.time.delayedCall(50, () => {
          firstInput.focus();
          firstInput.select();
        });
      }

      showEndModal({ title, winnerName, message }) {
        this.isEndModalOpen = true;

        const overlay = this.add.rectangle(
          this.gameWidth / 2,
          this.gameHeight / 2,
          this.gameWidth,
          this.gameHeight,
          0x000000,
          0.72
        ).setDepth(3000);

        const modal = this.add.rectangle(this.gameWidth / 2, this.gameHeight / 2, 780, 340, 0xf8fafc, 1)
          .setStrokeStyle(3, 0x1f2937)
          .setDepth(3001);

        const titleText = this.add.text(this.gameWidth / 2, 390, title, {
          fontSize: '36px',
          color: '#111827',
          fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(3002);

        const winnerText = this.add.text(this.gameWidth / 2, 450, winnerName, {
          fontSize: '34px',
          color: '#15803d',
          fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(3002);

        const messageText = this.add.text(this.gameWidth / 2, 532, message, {
          fontSize: '23px',
          color: '#111827',
          align: 'center',
          wordWrap: { width: 640 }
        }).setOrigin(0.5).setDepth(3002);

        const restartButton = this.add.rectangle(this.gameWidth / 2, 628, 250, 56, 0x93c5fd, 1)
          .setStrokeStyle(2, 0x1e3a8a)
          .setInteractive({ useHandCursor: true })
          .setDepth(3002);

        const restartText = this.add.text(this.gameWidth / 2, 628, 'Jogar novamente', {
          fontSize: '26px',
          color: '#111827',
          fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(3003);

        restartButton.on('pointerover', () => restartButton.setFillStyle(0xbfdbfe));
        restartButton.on('pointerout', () => restartButton.setFillStyle(0x93c5fd));

        restartButton.on('pointerdown', () => {
          this.playSound('button_click');
          this.isEndModalOpen = false;
          this.scene.restart();
        });
      }

      disableRollButton(label = 'Indisponível') {
        this.rollButton.disableInteractive();
        this.rollButton.setFillStyle(0x6b7280);
        this.updateRollButtonLabel(label);
      }

      enableRollButton(label) {
        if (
          !this.gameOver &&
          !this.isQuestionOpen &&
          !this.isPlayerSetupOpen &&
          !this.isEndModalOpen &&
          !this.isDiceModalOpen &&
          !this.isSuspenseModalOpen &&
          !this.isAnimating
        ) {
          this.rollButton.setInteractive({ useHandCursor: true });
          this.rollButton.setFillStyle(0xf59e0b);

          const current = this.players[this.currentPlayer];
          this.updateRollButtonLabel(label || (current ? current.nome : 'Sua vez'));
        }
      }
    }

    const config = {
      type: Phaser.AUTO,
      width: 1500,
      height: 1000,
      parent: 'game-container',
      backgroundColor: '#111827',
      dom: {
        createContainer: true
      },
      scene: [DiceGameScene]
    };

    new Phaser.Game(config);
  </script>
</body>

</html>
