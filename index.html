<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fuja da Tempestade</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
  <style>
    body {
      margin: 0;
      background: #111827;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      zoom: 0.8;
    }

    #game-container {
      border: 2px solid #2d3748;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 24px rgba(0, 0, 0, 0.35);
    }
  </style>
</head>

<body>
  <div id="game-container"></div>

  <script>
    class DiceGameScene extends Phaser.Scene {
      constructor() {
        super('DiceGameScene');
      }

      create() {
        this.gameWidth = 1500;
        this.gameHeight = 1000;

        this.sidebarWidth = Math.floor(this.gameWidth * 0.35);
        this.boardAreaWidth = this.gameWidth - this.sidebarWidth;

        this.sidebarX = this.gameWidth - this.sidebarWidth;
        this.sidebarCenterX = this.sidebarX + this.sidebarWidth / 2;

        this.totalCasas = 54;

        this.cellSize = 68;
        this.cellGap = 12;

        this.boardStartX = 54;
        this.boardStartY = 110;

        this.currentPlayer = 0;
        this.gameOver = false;
        this.isAnimating = false;
        this.isQuestionOpen = false;
        this.isPlayerSetupOpen = false;
        this.isEndModalOpen = false;
        this.isDiceModalOpen = false;
        this.isSuspenseModalOpen = false;

        this.turnCount = 0;
        this.roundCount = 0;
        this.stormPosition = 0;

        this.maxPlayers = 4;
        this.activePlayersCount = 2;

        this.bombas = [10, 19, 28, 36, 46, 50];
        this.questionHouses = [4, 8, 14, 17, 24, 26, 31, 39, 44, 48, 52, 34];

        this.boardCells = {};
        this.boardTexts = {};
        this.stormOverlays = {};
        this.boardIcons = {};

        this.playerColors = [0x22c55e, 0x3b82f6, 0xf59e0b, 0xa855f7];

        this.players = [
          { nome: 'Jogador 1', posicao: 1, color: this.playerColors[0], token: null, alive: true, enabled: true },
          { nome: 'Jogador 2', posicao: 1, color: this.playerColors[1], token: null, alive: true, enabled: true },
          { nome: 'Jogador 3', posicao: 1, color: this.playerColors[2], token: null, alive: true, enabled: false },
          { nome: 'Jogador 4', posicao: 1, color: this.playerColors[3], token: null, alive: true, enabled: false }
        ];

        this.questionPools = {
          Tecnologia: this.generateCategoryQuestions('Tecnologia'),
          'Sobre o Brasil': this.generateCategoryQuestions('Sobre o Brasil'),
          Filmes: this.generateCategoryQuestions('Filmes'),
          Músicas: this.generateCategoryQuestions('Músicas')
        };

        this.selectedCategory = 'Tecnologia';
        this.availableQuestions = [...this.questionPools[this.selectedCategory]];

        this.drawLayout();
        this.createSidebar();
        this.drawBoard();
        this.createPlayers();
        this.createButtons();
        this.showPlayerSetupModal();
      }

      drawLayout() {
        this.add.rectangle(
          this.boardAreaWidth / 2,
          this.gameHeight / 2,
          this.boardAreaWidth - 30,
          this.gameHeight - 30,
          0x0f172a
        ).setStrokeStyle(2, 0x374151);

        this.add.rectangle(
          this.sidebarCenterX,
          this.gameHeight / 2,
          this.sidebarWidth - 20,
          this.gameHeight - 30,
          0x1f2937
        ).setStrokeStyle(2, 0x374151);

        this.add.text(this.sidebarCenterX, 60, 'Fuja da Tempestade', {
          fontSize: '28px',
          color: '#ffffff',
          fontStyle: 'bold'
        }).setOrigin(0.5);
      }

      wait(ms) {
        return new Promise((resolve) => {
          this.time.delayedCall(ms, resolve);
        });
      }

      getPlayerTurnFeedback(playerName, dice, posicao) {
        if (this.isBombHouse(posicao)) {
          return {
            name: playerName,
            title: 'Se lascou',
            message: 'Caiu na bomba',
            emoji: '💥',
            accent: 0xef4444,
            panelColor: 0x1f172a,
            textColor: '#ffffff',
            duration: 2400,
            shake: true
          };
        }

        if (this.isQuestionHouse(posicao)) {
          return {
            name: playerName,
            title: 'Vamos ver se você é inteligente',
            message: 'Caiu na casa de pergunta',
            emoji: '❓',
            accent: 0xeab308,
            panelColor: 0x1f2937,
            textColor: '#ffffff',
            duration: 2600,
            shake: false
          };
        }

        if (dice <= 2) {
          return {
            name: playerName,
            title: 'Muito ruim',
            message: '',
            emoji: '😬',
            accent: 0xef4444,
            panelColor: 0x1f172a,
            textColor: '#ffffff',
            duration: 2200,
            shake: false
          };
        }

        if (dice <= 4) {
          return {
            name: playerName,
            title: 'Pode melhorar',
            message: '',
            emoji: '😐',
            accent: 0xf59e0b,
            panelColor: 0x1f2937,
            textColor: '#ffffff',
            duration: 2200,
            shake: false
          };
        }

        return {
          name: playerName,
          title: 'Mandou bem',
          message: '',
          emoji: '🔥',
          accent: 0x22c55e,
          panelColor: 0x052e16,
          textColor: '#ffffff',
          duration: 2200,
          shake: false
        };
      }

      getRandomQuestion() {
        if (!this.availableQuestions || this.availableQuestions.length === 0) {
          this.availableQuestions = [...this.questionPools[this.selectedCategory]];
        }

        const index = Phaser.Math.Between(0, this.availableQuestions.length - 1);
        return this.availableQuestions.splice(index, 1)[0];
      }

      generateCategoryQuestions(category) {
        const baseQuestions = {
          Tecnologia: [
            { question: 'Qual linguagem é usada no frontend?', options: ['JavaScript', 'Python', 'Java'], answer: 0 },
            { question: 'O que significa CPU?', options: ['Unidade Central de Processamento', 'Memória', 'Placa-mãe'], answer: 0 },
            { question: 'O que é HTML?', options: ['Linguagem de marcação', 'Banco de dados', 'Sistema operacional'], answer: 0 },
            { question: 'O que faz um navegador?', options: ['Exibe páginas web', 'Edita imagens', 'Compila código C++'], answer: 0 },
            { question: 'Qual tecnologia é usada para estilos?', options: ['CSS', 'SQL', 'XML'], answer: 0 }
          ],
          'Sobre o Brasil': [
            { question: 'Qual é a capital do Brasil?', options: ['Brasília', 'São Paulo', 'Rio'], answer: 0 },
            { question: 'Qual é o maior bioma do Brasil?', options: ['Amazônia', 'Caatinga', 'Pantanal'], answer: 0 },
            { question: 'Em que continente fica o Brasil?', options: ['América do Sul', 'África', 'Europa'], answer: 0 },
            { question: 'Qual é o idioma oficial?', options: ['Português', 'Espanhol', 'Inglês'], answer: 0 },
            { question: 'Qual é a moeda do Brasil?', options: ['Real', 'Euro', 'Dólar'], answer: 0 }
          ],
          Filmes: [
            { question: 'Qual filme tem um tubarão gigante?', options: ['Tubarão', 'Avatar', 'Matrix'], answer: 0 },
            { question: 'Quem dirige Indiana Jones?', options: ['Steven Spielberg', 'James Cameron', 'Quentin Tarantino'], answer: 0 },
            { question: 'Qual saga tem Jedi?', options: ['Star Wars', 'Harry Potter', 'Matrix'], answer: 0 },
            { question: 'Filme com dinossauros no parque?', options: ['Jurassic Park', 'Titanic', 'Os Vingadores'], answer: 0 },
            { question: 'Filme de heróis da Marvel?', options: ['Os Vingadores', 'Matrix', 'Clube da Luta'], answer: 0 }
          ],
          'Músicas': [
            { question: 'Quem canta a música "Shape of You"?', options: ['Ed Sheeran', 'Coldplay', 'Bruno Mars'], answer: 0 },
            { question: 'Qual é o nome do álbum "Thriller"?', options: ['Michael Jackson', 'Madonna', 'Prince'], answer: 0 },
            { question: 'Qual instrumento é típico de rock?', options: ['Guitarra', 'Flauta', 'Oboé'], answer: 0 },
            { question: 'Quem fez "Bohemian Rhapsody"?', options: ['Queen', 'The Beatles', 'Nirvana'], answer: 0 },
            { question: 'Qual gênero é samba?', options: ['BR', 'Country', 'K-Pop'], answer: 0 }
          ]
        };

        const template = baseQuestions[category] || baseQuestions['Tecnologia'];
        const pool = [];
        for (let i = 0; i < 50; i++) {
          const idx = i % template.length;
          pool.push({
            question: `${template[idx].question} (Pergunta ${i + 1})`,
            options: template[idx].options,
            answer: template[idx].answer
          });
        }
        return pool;
      }

      getStormTurnFeedback(dice) {
        if (dice <= 2) {
          return {
            name: '',
            title: 'Tempestade fraca',
            message: '',
            emoji: '🌫️',
            accent: 0x94a3b8,
            panelColor: 0x0f172a,
            textColor: '#ffffff',
            duration: 2200,
            shake: false
          };
        }

        if (dice <= 4) {
          return {
            name: '',
            title: 'Tempestade aumentando',
            message: '',
            emoji: '🌩️',
            accent: 0xf59e0b,
            panelColor: 0x1c1917,
            textColor: '#ffffff',
            duration: 2200,
            shake: true
          };
        }

        return {
          name: '',
          title: 'Tempestade chegando',
          message: '',
          emoji: '😈',
          accent: 0xef4444,
          panelColor: 0x111111,
          textColor: '#ffffff',
          duration: 2200,
          shake: true
        };
      }

      showSuspenseModal({
        name = '',
        title,
        message = '',
        emoji,
        accent = 0xf59e0b,
        panelColor = 0x111827,
        textColor = '#ffffff',
        duration = 2200,
        shake = false
      }) {
        return new Promise((resolve) => {
          this.isSuspenseModalOpen = true;

          const depth = 2500;
          const centerX = this.gameWidth / 2;
          const centerY = this.gameHeight / 2;

          const hasName = !!name;
          const hasMessage = !!message;

          let modalHeight = 280;
          if (hasName) modalHeight += 40;
          if (hasMessage) modalHeight += 52;

          const modalWidth = 620;

          const overlay = this.add.rectangle(
            centerX,
            centerY,
            this.gameWidth,
            this.gameHeight,
            0x000000,
            0
          ).setDepth(depth);

          const glow = this.add.rectangle(
            centerX,
            centerY,
            modalWidth + 40,
            modalHeight + 40,
            accent,
            0
          ).setDepth(depth + 1).setScale(0.88);

          const shadow = this.add.rectangle(
            centerX + 8,
            centerY + 10,
            modalWidth,
            modalHeight,
            0x000000,
            0
          ).setDepth(depth + 2).setScale(0.88);

          const modal = this.add.rectangle(
            centerX,
            centerY,
            modalWidth,
            modalHeight,
            panelColor,
            0.98
          )
            .setStrokeStyle(3, accent)
            .setDepth(depth + 3)
            .setScale(0.88)
            .setAlpha(0);

          const accentBar = this.add.rectangle(
            centerX,
            centerY - (modalHeight / 2) + 26,
            460,
            8,
            accent,
            1
          ).setDepth(depth + 4).setScale(0.88).setAlpha(0);

          let nameText = null;
          if (hasName) {
            nameText = this.add.text(
              centerX,
              centerY - 102,
              name,
              {
                fontSize: '24px',
                color: '#cbd5e1',
                fontStyle: 'bold',
                align: 'center'
              }
            ).setOrigin(0.5).setDepth(depth + 4).setAlpha(0);
          }

          const titleY = hasName ? centerY - 52 : centerY - 44;

          const titleText = this.add.text(
            centerX,
            titleY,
            title,
            {
              fontSize: '34px',
              color: textColor,
              fontStyle: 'bold',
              align: 'center',
              wordWrap: { width: 500 }
            }
          ).setOrigin(0.5).setDepth(depth + 4).setAlpha(0);

          let messageText = null;
          if (hasMessage) {
            messageText = this.add.text(
              centerX,
              centerY + 10,
              message,
              {
                fontSize: '22px',
                color: '#e5e7eb',
                align: 'center',
                wordWrap: { width: 460 }
              }
            ).setOrigin(0.5).setDepth(depth + 4).setAlpha(0);
          }

          const emojiY = hasMessage ? centerY + 94 : centerY + 56;

          const emojiText = this.add.text(
            centerX,
            emojiY,
            emoji,
            {
              fontSize: '100px'
            }
          ).setOrigin(0.5).setDepth(depth + 5).setAlpha(0).setScale(0.7);

          const progressBg = this.add.rectangle(
            centerX - 170,
            centerY + (modalHeight / 2) - 26,
            340,
            8,
            0x334155,
            0.9
          ).setOrigin(0, 0.5).setDepth(depth + 4).setAlpha(0);

          const progressFill = this.add.rectangle(
            centerX - 170,
            centerY + (modalHeight / 2) - 26,
            340,
            8,
            accent,
            1
          ).setOrigin(0, 0.5).setDepth(depth + 5).setAlpha(0);

          this.tweens.add({
            targets: overlay,
            alpha: 0.68,
            duration: 180
          });

          this.tweens.add({
            targets: [glow, shadow],
            alpha: { from: 0, to: [0.12, 0.24] },
            scaleX: 1,
            scaleY: 1,
            duration: 220,
            ease: 'Back.easeOut'
          });

          this.tweens.add({
            targets: [modal, accentBar],
            alpha: 1,
            scaleX: 1,
            scaleY: 1,
            duration: 240,
            ease: 'Back.easeOut'
          });

          const fadeTargets = [titleText, progressBg, progressFill];
          if (nameText) fadeTargets.push(nameText);
          if (messageText) fadeTargets.push(messageText);

          this.tweens.add({
            targets: fadeTargets,
            alpha: 1,
            y: '-=6',
            duration: 260,
            ease: 'Sine.easeOut',
            delay: 80
          });

          this.tweens.add({
            targets: emojiText,
            alpha: 1,
            scaleX: 1,
            scaleY: 1,
            duration: 300,
            ease: 'Back.easeOut',
            delay: 100
          });

          const pulseTween = this.tweens.add({
            targets: [emojiText, glow],
            scaleX: '+=0.03',
            scaleY: '+=0.03',
            alpha: { from: 1, to: 0.9 },
            duration: 420,
            yoyo: true,
            repeat: -1
          });

          const progressTween = this.tweens.add({
            targets: progressFill,
            scaleX: 0,
            duration,
            ease: 'Linear'
          });

          if (shake) {
            this.tweens.add({
              targets: [modal, shadow, titleText],
              x: '+=6',
              duration: 55,
              yoyo: true,
              repeat: 5,
              delay: 260
            });
          }

          const close = () => {
            pulseTween.stop();
            progressTween.stop();

            const destroyTargets = [
              overlay,
              glow,
              shadow,
              modal,
              accentBar,
              titleText,
              emojiText,
              progressBg,
              progressFill
            ];

            if (nameText) destroyTargets.push(nameText);
            if (messageText) destroyTargets.push(messageText);

            this.tweens.add({
              targets: destroyTargets,
              alpha: 0,
              scaleX: 0.92,
              scaleY: 0.92,
              duration: 180,
              ease: 'Sine.easeIn',
              onComplete: () => {
                overlay.destroy();
                glow.destroy();
                shadow.destroy();
                modal.destroy();
                accentBar.destroy();
                if (nameText) nameText.destroy();
                titleText.destroy();
                if (messageText) messageText.destroy();
                emojiText.destroy();
                progressBg.destroy();
                progressFill.destroy();
                this.isSuspenseModalOpen = false;
                resolve();
              }
            });
          };

          this.time.delayedCall(duration, close);
        });
      }

      showDiceTurnModal(playerName) {
        return new Promise((resolve) => {
          this.isDiceModalOpen = true;

          const overlay = this.add.rectangle(
            this.gameWidth / 2,
            this.gameHeight / 2,
            this.gameWidth,
            this.gameHeight,
            0x000000,
            0.72
          ).setDepth(1500);

          const modalWidth = 560;
          const modalHeight = 420;
          const modalCenterX = this.gameWidth / 2;
          const modalCenterY = this.gameHeight / 2;

          const shadow = this.add.rectangle(
            modalCenterX + 6,
            modalCenterY + 6,
            modalWidth,
            modalHeight,
            0x000000,
            0.2
          ).setDepth(1501);

          const modal = this.add.rectangle(
            modalCenterX,
            modalCenterY,
            modalWidth,
            modalHeight,
            0xf8fafc,
            1
          )
            .setStrokeStyle(3, 0x1f2937)
            .setDepth(1502);

          const title = this.add.text(
            modalCenterX,
            modalCenterY - 145,
            `${playerName}, jogue o dado`,
            {
              fontSize: '30px',
              color: '#111827',
              fontStyle: 'bold',
              align: 'center',
              wordWrap: { width: 440 }
            }
          ).setOrigin(0.5).setDepth(1503);

          const subtitle = this.add.text(
            modalCenterX,
            modalCenterY - 102,
            'Clique no botão para rolar',
            {
              fontSize: '17px',
              color: '#475569',
              align: 'center'
            }
          ).setOrigin(0.5).setDepth(1503);

          const diceSize = 120;

          const diceBox = this.add.rectangle(
            modalCenterX,
            modalCenterY - 8,
            diceSize,
            diceSize,
            0xffffff,
            1
          )
            .setStrokeStyle(3, 0x0f172a)
            .setDepth(1503);

          const diceText = this.add.text(
            modalCenterX,
            modalCenterY - 8,
            '-',
            {
              fontSize: '56px',
              color: '#111111',
              fontStyle: 'bold'
            }
          ).setOrigin(0.5).setDepth(1504);

          const rollButton = this.add.rectangle(
            modalCenterX,
            modalCenterY + 125,
            270,
            58,
            0xf59e0b,
            1
          )
            .setStrokeStyle(2, 0x0f172a)
            .setInteractive({ useHandCursor: true })
            .setDepth(1503);

          const rollButtonText = this.add.text(
            modalCenterX,
            modalCenterY + 125,
            'Jogar dado',
            {
              fontSize: '24px',
              color: '#111111',
              fontStyle: 'bold'
            }
          ).setOrigin(0.5).setDepth(1504);

          const setDiceVisual = (value) => {
            const isEven = value % 2 === 0;
            diceBox.setFillStyle(isEven ? 0xffffff : 0xd1d5db, 1);
            diceText.setText(String(value));
            diceText.setColor('#111111');
          };

          const destroyModal = () => {
            overlay.destroy();
            shadow.destroy();
            modal.destroy();
            title.destroy();
            subtitle.destroy();
            diceBox.destroy();
            diceText.destroy();
            rollButton.destroy();
            rollButtonText.destroy();
            this.isDiceModalOpen = false;
          };

          const animateRoll = () => {
            return new Promise((rollResolve) => {
              rollButton.disableInteractive();
              rollButton.setFillStyle(0x9ca3af);

              let count = 0;

              const event = this.time.addEvent({
                delay: 95,
                repeat: 11,
                callback: () => {
                  const tempValue = Phaser.Math.Between(1, 6);
                  setDiceVisual(tempValue);

                  this.tweens.add({
                    targets: [diceBox, diceText],
                    scaleX: 1.08,
                    scaleY: 1.08,
                    angle: Phaser.Math.Between(-4, 4),
                    duration: 90,
                    yoyo: true
                  });

                  count++;

                  if (count >= 12) {
                    event.remove(false);

                    const finalValue = Phaser.Math.Between(1, 6);
                    setDiceVisual(finalValue);

                    this.tweens.add({
                      targets: [diceBox, diceText],
                      scaleX: 1.14,
                      scaleY: 1.14,
                      angle: 0,
                      duration: 90,
                      yoyo: true,
                      onComplete: () => {
                        this.time.delayedCall(260, () => {
                          destroyModal();
                          rollResolve(finalValue);
                        });
                      }
                    });
                  }
                }
              });
            });
          };

          rollButton.on('pointerover', () => {
            rollButton.setFillStyle(0xfbbf24);
          });

          rollButton.on('pointerout', () => {
            if (rollButton.input && rollButton.input.enabled) {
              rollButton.setFillStyle(0xf59e0b);
            }
          });

          rollButton.on('pointerdown', async () => {
            const finalValue = await animateRoll();
            resolve(finalValue);
          });
        });
      }

      createSidebar() {
        const left = this.sidebarX + 22;
        const centerX = this.sidebarCenterX;
        const cardWidth = this.sidebarWidth - 44;
        const innerPaddingX = 22;
        const innerPaddingY = 18;
        const contentLeft = left + innerPaddingX;
        const wrapWidth = cardWidth - (innerPaddingX * 2);

        const statusCardY = 98;
        const statusCardHeight = 150;

        this.add.rectangle(
          centerX + 4,
          statusCardY + 4,
          cardWidth,
          statusCardHeight,
          0x000000,
          0.18
        ).setOrigin(0.5, 0);

        this.add.rectangle(
          centerX,
          statusCardY,
          cardWidth,
          statusCardHeight,
          0x111827,
          0.92
        )
          .setOrigin(0.5, 0)
          .setStrokeStyle(1.5, 0x334155);

        this.statusText = this.add.text(
          contentLeft,
          statusCardY + innerPaddingY,
          'Vez de: Jogador 1',
          {
            fontSize: '22px',
            color: '#ffffff',
            fontStyle: 'bold',
            wordWrap: { width: wrapWidth }
          }
        );

        this.infoText = this.add.text(
          contentLeft,
          statusCardY + innerPaddingY + 42,
          'Informe os jogadores para começar.',
          {
            fontSize: '16px',
            color: '#cbd5e1',
            wordWrap: { width: wrapWidth },
            lineSpacing: 4
          }
        );

        this.stormText = this.add.text(
          contentLeft,
          statusCardY + innerPaddingY + 92,
          'Tempestade: nenhuma casa destruída',
          {
            fontSize: '15px',
            color: '#fca5a5',
            fontStyle: 'bold',
            wordWrap: { width: wrapWidth }
          }
        );

        const playersCardY = 272;
        const playersCardHeight = 190;

        this.add.rectangle(
          centerX + 4,
          playersCardY + 4,
          cardWidth,
          playersCardHeight,
          0x000000,
          0.18
        ).setOrigin(0.5, 0);

        this.add.rectangle(
          centerX,
          playersCardY,
          cardWidth,
          playersCardHeight,
          0x111827,
          0.92
        )
          .setOrigin(0.5, 0)
          .setStrokeStyle(1.5, 0x334155);

        this.legendTitle = this.add.text(
          contentLeft,
          playersCardY + innerPaddingY,
          'Jogadores',
          {
            fontSize: '19px',
            color: '#ffffff',
            fontStyle: 'bold'
          }
        );

        this.playerLegendDots = [];
        this.playerLegendTexts = [];

        const playerStartY = playersCardY + 62;
        const playerRowGap = 32;

        for (let i = 0; i < this.maxPlayers; i++) {
          const y = playerStartY + i * playerRowGap;

          const dot = this.add.circle(contentLeft + 10, y + 8, 8, this.players[i].color);
          const text = this.add.text(contentLeft + 30, y - 4, this.players[i].nome, {
            fontSize: '18px',
            color: '#ffffff',
            fontStyle: 'bold'
          });

          this.playerLegendDots.push(dot);
          this.playerLegendTexts.push(text);
        }

        const rulesCardY = 486;
        const rulesCardHeight = 150;

        this.add.rectangle(
          centerX + 4,

        ).setOrigin(0.5, 0);

          0x111827,

        )

      updateHeaderNames() {
        this.statusText.setText(`Vez de: ${this.players[this.currentPlayer].nome}`);

        for (let i = 0; i < this.maxPlayers; i++) {
          this.playerLegendTexts[i].setText(this.players[i].nome);

          const visible = this.players[i].enabled;
          this.playerLegendDots[i].setVisible(visible);
          this.playerLegendTexts[i].setVisible(visible);

          if (visible && !this.players[i].alive) {
            this.playerLegendTexts[i].setColor('#9ca3af');
            this.playerLegendDots[i].setAlpha(0.35);
          } else if (visible) {
            this.playerLegendTexts[i].setColor('#ffffff');
            this.playerLegendDots[i].setAlpha(1);
          }
        }
      }

      getPathGridPosition(posicao) {
        if (posicao >= 1 && posicao <= 10) return { col: posicao - 1, row: 0 };
        if (posicao === 11) return { col: 9, row: 1 };

        if (posicao >= 12 && posicao <= 21) return { col: 21 - posicao, row: 2 };
        if (posicao === 22) return { col: 0, row: 3 };

        if (posicao >= 23 && posicao <= 32) return { col: posicao - 23, row: 4 };
        if (posicao === 33) return { col: 9, row: 5 };

        if (posicao >= 34 && posicao <= 43) return { col: 43 - posicao, row: 6 };
        if (posicao === 44) return { col: 0, row: 7 };

        if (posicao >= 45 && posicao <= 54) return { col: posicao - 45, row: 8 };

        return { col: 0, row: 0 };
      }

      getCellTopLeft(posicao) {
        const { col, row } = this.getPathGridPosition(posicao);
        const x = this.boardStartX + col * (this.cellSize + this.cellGap);
        const y = this.boardStartY + row * (this.cellSize + this.cellGap);
        return { x, y };
      }

      drawBoard() {
        for (let pos = 1; pos <= this.totalCasas; pos++) {
          const { x, y } = this.getCellTopLeft(pos);
          const isBomb = this.bombas.includes(pos);
          const isQuestion = this.questionHouses.includes(pos);

          let bgColor = 0xe5e7eb;
          if (isBomb) bgColor = 0xfca5a5;
          if (isQuestion) bgColor = 0xfde68a;

          const cell = this.add.rectangle(
            x + this.cellSize / 2,
            y + this.cellSize / 2,
            this.cellSize,
            this.cellSize,
            bgColor
          ).setStrokeStyle(2, 0x1f2937);

          const stormOverlay = this.add.rectangle(
            x + this.cellSize / 2,
            y + this.cellSize / 2,
            this.cellSize,
            this.cellSize,
            0x000000,
            0
          ).setStrokeStyle(2, 0x0f172a);

          this.boardCells[pos] = cell;
          this.stormOverlays[pos] = stormOverlay;

          if (isBomb) {
            const icon = this.add.text(x + this.cellSize / 2, y + 10, '💣', {
              fontSize: '22px'
            }).setOrigin(0.5, 0);

            this.boardIcons[pos] = icon;

            this.boardTexts[pos] = this.add.text(
              x + this.cellSize / 2,
              y + 46,
              String(pos),
              {
                fontSize: '16px',
                color: '#111827',
                fontStyle: 'bold'
              }
            ).setOrigin(0.5);
          } else if (isQuestion) {
            const icon = this.add.text(x + this.cellSize / 2, y + 4, '?', {
              fontSize: '32px',
              color: '#b91c1c',
              fontStyle: 'bold'
            }).setOrigin(0.5, 0);

            this.boardIcons[pos] = icon;

            this.boardTexts[pos] = this.add.text(
              x + this.cellSize / 2,
              y + 46,
              String(pos),
              {
                fontSize: '16px',
                color: '#111827',
                fontStyle: 'bold'
              }
            ).setOrigin(0.5);
          } else {
            this.boardTexts[pos] = this.add.text(
              x + this.cellSize / 2,
              y + this.cellSize / 2,
              String(pos),
              {
                fontSize: '20px',
                color: '#111827',
                fontStyle: 'bold'
              }
            ).setOrigin(0.5);
          }
        }

        const start = this.getCellTopLeft(1);
        const end = this.getCellTopLeft(this.totalCasas);

        this.add.text(start.x, start.y - 38, 'INÍCIO', {
          fontSize: '20px',
          color: '#ffffff',
          fontStyle: 'bold'
        });

        this.add.text(end.x + 20, end.y + 92, 'FIM', {
          fontSize: '20px',
          color: '#ffffff',
          fontStyle: 'bold'
        });
      }

      getTokenPosition(posicao, playerIndex) {
        const { x, y } = this.getCellTopLeft(posicao);

        const offsetMap = [
          { x: -14, y: -14 },
          { x: 14, y: -14 },
          { x: -14, y: 14 },
          { x: 14, y: 14 }
        ];

        return {
          x: x + this.cellSize / 2 + offsetMap[playerIndex].x,
          y: y + this.cellSize / 2 + offsetMap[playerIndex].y
        };
      }

      createPlayers() {
        for (let i = 0; i < this.maxPlayers; i++) {
          const pos = this.getTokenPosition(1, i);

          this.players[i].token = this.add.circle(pos.x, pos.y, 12, this.players[i].color)
            .setStrokeStyle(3, 0xffffff)
            .setVisible(this.players[i].enabled);
        }
      }

      refreshPlayerTokensVisibility() {
        for (let i = 0; i < this.maxPlayers; i++) {
          this.players[i].token.setVisible(this.players[i].enabled);
        }
      }

      createButtons() {
        const centerX = this.sidebarCenterX;
        const cardWidth = this.sidebarWidth - 44;

        const innerPaddingX = 22;
        const innerPaddingY = 18;

        const buttonWidth = cardWidth - (innerPaddingX * 2);

        const actionsCardY = 656;
        const actionsCardHeight = 132;

        this.add.rectangle(
          centerX + 4,
          actionsCardY + 4,
          cardWidth,
          actionsCardHeight,
          0x000000,
          0.18
        ).setOrigin(0.5, 0);

        this.add.rectangle(
          centerX,
          actionsCardY,
          cardWidth,
          actionsCardHeight,
          0x111827,
          0.92
        )
          .setOrigin(0.5, 0)
          .setStrokeStyle(1.5, 0x334155);

        const rollY = actionsCardY + innerPaddingY + 28;

        this.rollButton = this.add.rectangle(
          centerX,

        )

        }).setOrigin(0.5);

        const restartY = rollY + 58;

        )
          .setStrokeStyle(2, 0x0f172a)

        }).setOrigin(0.5);

        this.rollButton.on('pointerdown', () => this.startTurn());
        this.restartButton.on('pointerdown', () => this.scene.restart());

        this.rollButton.on('pointerover', () => {
          if (!this.gameOver && !this.isAnimating && !this.isQuestionOpen && !this.isPlayerSetupOpen && !this.isEndModalOpen && !this.isDiceModalOpen && !this.isSuspenseModalOpen) {
            this.rollButton.setFillStyle(0xfbbf24);
          }
        });

        this.rollButton.on('pointerout', () => {
          if (!this.gameOver && !this.isAnimating && !this.isQuestionOpen && !this.isPlayerSetupOpen && !this.isEndModalOpen && !this.isDiceModalOpen && !this.isSuspenseModalOpen) {
            this.rollButton.setFillStyle(0xf59e0b);
          }
        });

          this.restartButton.setFillStyle(0xbfdbfe);

      getEnabledPlayers() {
        return this.players.filter((p) => p.enabled);
      }

      getAlivePlayers() {
        return this.players.filter((p) => p.enabled && p.alive);
      }

      updateRollButtonLabel(label) {
        if (this.rollButtonText) {
          this.rollButtonText.setText(label);
        }
      }

      syncRollButtonState() {
        if (!this.rollButton || !this.rollButtonText) return;

        if (this.gameOver) {
          this.disableRollButton('Fim de jogo');
          return;
        }

        if (this.isPlayerSetupOpen || this.isQuestionOpen || this.isEndModalOpen || this.isDiceModalOpen || this.isSuspenseModalOpen) {
          this.disableRollButton('Aguarde');
          return;
        }

        if (this.isAnimating) {
          this.disableRollButton('Aguarde');
          return;
        }

        const current = this.players[this.currentPlayer];
        if (current && current.enabled && current.alive) {
          this.enableRollButton(current.nome);
        } else {
          this.disableRollButton('Aguarde');
        }
      }

      advanceToNextAlivePlayer() {
        if (this.gameOver) return;

        let attempts = 0;
        do {
          this.currentPlayer = (this.currentPlayer + 1) % this.maxPlayers;
          attempts++;
        } while (
          attempts <= this.maxPlayers &&
          (!this.players[this.currentPlayer].enabled || !this.players[this.currentPlayer].alive)
        );
      }

      async startTurn() {
        if (
          this.gameOver ||
          this.isAnimating ||
          this.isQuestionOpen ||
          this.isPlayerSetupOpen ||
          this.isEndModalOpen ||
          this.isDiceModalOpen ||
          this.isSuspenseModalOpen
        ) return;

        const player = this.players[this.currentPlayer];

        if (!player.enabled || !player.alive) {
          this.advanceToNextAlivePlayer();
          this.updateHeaderNames();
          this.enableRollButton(this.players[this.currentPlayer].nome);
          return;
        }

        this.isAnimating = true;
        this.disableRollButton(player.nome);
        this.infoText.setText(`${player.nome} está rolando o dado...`);

        const dice = await this.showDiceTurnModal(player.nome);

        this.infoText.setText(`${player.nome} tirou ${dice}. Movendo...`);
        await this.movePlayerStepByStep(player, this.currentPlayer, dice);

        if (this.gameOver || !player.alive) return;

        if (this.isStormHouse(player.posicao)) {
          this.handleStormDefeat(
            player,
            `${player.nome} caiu em uma casa já consumida pela tempestade.`
          );
          return;
        }

        await this.showSuspenseModal(
          this.getPlayerTurnFeedback(player.nome, dice, player.posicao)
        );

        if (this.gameOver || !player.alive) return;

        if (player.posicao >= this.totalCasas) {
          this.handleVictory(player);
          return;
        }

        if (this.isBombHouse(player.posicao)) {
          await this.handleBomb(player, this.currentPlayer);
        } else if (this.isQuestionHouse(player.posicao)) {
          await this.handleQuestionHouse(player, this.currentPlayer);
        }

        if (this.gameOver || !player.alive) return;

        if (player.posicao >= this.totalCasas) {
          this.handleVictory(player);
          return;
        }

        if (this.isStormHouse(player.posicao)) {
          this.handleStormDefeat(
            player,
            `${player.nome} terminou o turno em uma casa já consumida pela tempestade.`
          );
          return;
        }

        this.turnCount++;

        const totalEnabled = this.getEnabledPlayers().length;
        if (totalEnabled > 0 && this.turnCount % totalEnabled === 0) {
          this.roundCount++;

          if (this.roundCount >= 2) {
            this.disableRollButton('Tempestade');

            const stormDice = await this.showStormDiceModal();
            this.infoText.setText(`A tempestade avançará ${stormDice} casa(s)!`);

            await this.advanceStormBy(stormDice);

            if (this.gameOver) return;

            await this.showSuspenseModal(
              this.getStormTurnFeedback(stormDice)
            );

            if (this.gameOver) return;
          }
        }

        this.advanceToNextAlivePlayer();
        this.statusText.setText(`Vez de: ${this.players[this.currentPlayer].nome}`);
        this.infoText.setText('Clique no botão para jogar o dado.');

        this.isAnimating = false;
        this.enableRollButton(this.players[this.currentPlayer].nome);
      }

      showStormDiceModal() {
        return new Promise((resolve) => {
          this.isDiceModalOpen = true;

          const modalCenterX = this.gameWidth / 2;
          const modalCenterY = this.gameHeight / 2;
          const modalWidth = 600;
          const modalHeight = 420;

          const overlay = this.add.rectangle(
            modalCenterX,
            modalCenterY,
            this.gameWidth,
            this.gameHeight,
            0x000000,
            0.8
          ).setDepth(1600);

          const shadow = this.add.rectangle(
            modalCenterX + 8,
            modalCenterY + 8,
            modalWidth,
            modalHeight,
            0x000000,
            0.28
          ).setDepth(1601);

          const modal = this.add.rectangle(
            modalCenterX,
            modalCenterY,
            modalWidth,
            modalHeight,
            0x111111,
            0.98
          )
            .setStrokeStyle(3, 0x7f1d1d)
            .setDepth(1602);

          const title = this.add.text(
            modalCenterX,
            modalCenterY - 140,
            'Tempestade chegando',
            {
              fontSize: '34px',
              color: '#fca5a5',
              fontStyle: 'bold',
              align: 'center'
            }
          ).setOrigin(0.5).setDepth(1603);

          const subtitle = this.add.text(
            modalCenterX,
            modalCenterY - 96,
            'A tempestade está rolando o dado...',
            {
              fontSize: '18px',
              color: '#d1d5db',
              align: 'center'
            }
          ).setOrigin(0.5).setDepth(1603);

          const diceSize = 126;

          const diceBox = this.add.rectangle(
            modalCenterX,
            modalCenterY + 6,
            diceSize,
            diceSize,
            0xffffff,
            1
          )
            .setStrokeStyle(3, 0x450a0a)
            .setDepth(1603);

          const diceText = this.add.text(
            modalCenterX,
            modalCenterY + 6,
            '-',
            {
              fontSize: '58px',
              color: '#111111',
              fontStyle: 'bold'
            }
          ).setOrigin(0.5).setDepth(1604);

          const glow = this.add.rectangle(
            modalCenterX,
            modalCenterY + 6,
            diceSize + 20,
            diceSize + 20,
            0x7f1d1d,
            0.08
          ).setDepth(1602);

          const setDiceVisual = (value) => {
            const isEven = value % 2 === 0;
            diceBox.setFillStyle(isEven ? 0xffffff : 0xd1d5db, 1);
            diceText.setText(String(value));
            diceText.setColor('#111111');
          };

          const destroyModal = () => {
            overlay.destroy();
            shadow.destroy();
            modal.destroy();
            title.destroy();
            subtitle.destroy();
            glow.destroy();
            diceBox.destroy();
            diceText.destroy();
            this.isDiceModalOpen = false;
          };

          let count = 0;

          this.tweens.add({
            targets: title,
            alpha: 0.72,
            duration: 500,
            yoyo: true,
            repeat: -1
          });

          this.tweens.add({
            targets: glow,
            alpha: 0.18,
            scaleX: 1.08,
            scaleY: 1.08,
            duration: 480,
            yoyo: true,
            repeat: -1
          });

          const event = this.time.addEvent({
            delay: 95,
            repeat: 11,
            callback: () => {
              const tempValue = Phaser.Math.Between(1, 6);
              setDiceVisual(tempValue);

              this.tweens.add({
                targets: [diceBox, diceText],
                scaleX: 1.1,
                scaleY: 1.1,
                angle: Phaser.Math.Between(-6, 6),
                duration: 90,
                yoyo: true
              });

              count++;

              if (count >= 12) {
                event.remove(false);

                const finalValue = Phaser.Math.Between(1, 6);
                setDiceVisual(finalValue);

                this.tweens.add({
                  targets: [diceBox, diceText],
                  scaleX: 1.16,
                  scaleY: 1.16,
                  angle: 0,
                  duration: 120,
                  yoyo: true,
                  onComplete: () => {
                    this.time.delayedCall(450, () => {
                      destroyModal();
                      resolve(finalValue);
                    });
                  }
                });
              }
            }
          });
        });
      }

      handleVictory(player) {
        this.gameOver = true;
        this.isAnimating = false;
        this.isQuestionOpen = false;

        const others = this.getEnabledPlayers().filter((p) => p !== player).map((p) => p.nome).join(', ');
        this.statusText.setText(`${player.nome} venceu!`);
        this.infoText.setText('Fim de jogo.');
        this.disableRollButton();

        this.tweens.add({
          targets: player.token,
          scale: 1.35,
          duration: 450,
          yoyo: true,
          repeat: 5
        });

        this.showEndModal({
          title: 'Parabéns!',
          winnerName: player.nome,
          message: others
            ? `${player.nome} chegou ao fim da pista e venceu a partida contra ${others}.`
            : `${player.nome} venceu a partida.`
        });
      }

      handleStormDefeat(loserPlayer, reason, options = { checkEndGame: true }) {
        if (!loserPlayer.alive) return;

        loserPlayer.alive = false;
        loserPlayer.token.setAlpha(0.25);
        loserPlayer.token.setScale(0.8);

        this.updateHeaderNames();

        this.tweens.add({
          targets: loserPlayer.token,
          alpha: 0.15,
          scale: 0.6,
          duration: 450,
          yoyo: true,
          repeat: 3
        });

        if (!options.checkEndGame) {
          this.infoText.setText(`${loserPlayer.nome} foi eliminado. ${reason}`);
          return;
        }

        const alivePlayers = this.getAlivePlayers();

        if (alivePlayers.length === 1) {
          const winner = alivePlayers[0];
          this.gameOver = true;
          this.isAnimating = false;
          this.isQuestionOpen = false;

          this.statusText.setText(`${winner.nome} venceu!`);
          this.infoText.setText(reason);
          this.disableRollButton();

          this.showEndModal({
            title: 'Parabéns!',
            winnerName: winner.nome,
            message: `${winner.nome} venceu porque ${loserPlayer.nome} foi engolido pela tempestade. Motivo: ${reason}`
          });

          return;
        }

        if (alivePlayers.length === 0) {
          this.gameOver = true;
          this.isAnimating = false;
          this.isQuestionOpen = false;
          this.statusText.setText('Sem vencedores');
          this.infoText.setText('Todos os jogadores foram eliminados.');
          this.disableRollButton();

          this.showEndModal({
            title: 'Fim de jogo',
            winnerName: 'Sem vencedor',
            message: 'Todos os jogadores foram eliminados pela tempestade.'
          });

          return;
        }

        this.isAnimating = false;
        this.infoText.setText(`${loserPlayer.nome} foi eliminado. ${reason}`);
        this.advanceToNextAlivePlayer();
        this.statusText.setText(`Vez de: ${this.players[this.currentPlayer].nome}`);
        this.enableRollButton(this.players[this.currentPlayer].nome);
      }

      isBombHouse(posicao) {
        return this.bombas.includes(posicao);
      }

      isQuestionHouse(posicao) {
        return this.questionHouses.includes(posicao);
      }

      isStormHouse(posicao) {
        return this.stormPosition > 0 && posicao <= this.stormPosition;
      }

      async movePlayerStepByStep(player, playerIndex, dice) {
        const destinoFinal = Math.min(player.posicao + dice, this.totalCasas);

        while (player.posicao < destinoFinal) {
          player.posicao++;
          await this.moveTokenToPosition(player.token, player.posicao, playerIndex);

          if (this.isStormHouse(player.posicao)) {
            this.handleStormDefeat(
              player,
              `${player.nome} entrou em uma casa consumida pela tempestade durante o movimento.`
            );
            return;
          }
        }
      }

      moveTokenToPosition(token, posicao, playerIndex) {
        return new Promise((resolve) => {
          const target = this.getTokenPosition(posicao, playerIndex);

          this.tweens.add({
            targets: token,
            x: target.x,
            y: target.y,
            duration: 480,
            ease: 'Sine.easeInOut',
            onComplete: () => resolve()
          });
        });
      }

      async handleBomb(player, playerIndex) {
        const casaAtual = player.posicao;
        const novaPosicao = Math.max(1, player.posicao - 3);

        this.infoText.setText(
          `${player.nome} caiu na bomba da casa ${casaAtual} e voltou 3 casas!`
        );

        await this.flashSpecialHouse(casaAtual);
        await this.shakeToken(player.token);

        while (player.posicao > novaPosicao) {
          player.posicao--;
          await this.moveTokenToPosition(player.token, player.posicao, playerIndex);

          if (this.isStormHouse(player.posicao)) {
            this.handleStormDefeat(
              player,
              `${player.nome} recuou para uma casa já consumida pela tempestade após cair na bomba.`
            );
            return;
          }
        }
      }

      async handleQuestionHouse(player, playerIndex) {
        const casa = player.posicao;
        this.infoText.setText(`${player.nome} caiu na casa de pergunta ${casa}.`);

        await this.flashSpecialHouse(casa);

        const question = this.getRandomQuestion();
        const isCorrect = await this.showQuestionModal(question);

        if (this.gameOver || !player.alive) return;

        if (isCorrect) {
          this.infoText.setText(`${player.nome} acertou e avançou 1 casa!`);

          if (player.posicao < this.totalCasas) {
            player.posicao += 1;
            await this.moveTokenToPosition(player.token, player.posicao, playerIndex);

            if (this.isStormHouse(player.posicao)) {
              this.handleStormDefeat(
                player,
                `${player.nome} avançou para uma casa já consumida pela tempestade após acertar a pergunta.`
              );
              return;
            }
          }
        } else {
          this.infoText.setText(`${player.nome} errou e voltou 1 casa.`);

          if (player.posicao > 1) {
            player.posicao -= 1;
            await this.moveTokenToPosition(player.token, player.posicao, playerIndex);

            if (this.isStormHouse(player.posicao)) {
              this.handleStormDefeat(
                player,
                `${player.nome} recuou para uma casa já consumida pela tempestade após errar a pergunta.`
              );
              return;
            }
          }
        }
      }

      async advanceStormBy(steps) {
        for (let i = 0; i < steps; i++) {
          if (this.stormPosition >= this.totalCasas) return;

          this.stormPosition += 1;
          this.stormText.setText(`Tempestade: casas 1 até ${this.stormPosition} destruídas`);

          const cell = this.boardCells[this.stormPosition];
          const text = this.boardTexts[this.stormPosition];
          const icon = this.boardIcons[this.stormPosition];
          const overlay = this.stormOverlays[this.stormPosition];

          await new Promise((resolve) => {
            this.tweens.add({
              targets: overlay,
              alpha: 0.78,
              duration: 420,
              onComplete: () => resolve()
            });
          });

          cell.setFillStyle(0x111111, 0.92);

          if (text) text.setColor('#d1d5db');

          if (icon) {
            icon.setColor('#d1d5db');
            icon.setAlpha(0.5);
          }

          await this.flashStormWarning(this.stormPosition);

          const alivePlayers = [...this.getAlivePlayers()];
          for (const player of alivePlayers) {
            if (player.posicao <= this.stormPosition) {
              this.handleStormDefeat(
                player,
                `${player.nome} foi alcançado pela tempestade quando ela destruiu a casa ${this.stormPosition}.`,
                { checkEndGame: false }
              );
            }
          }

          const survivors = this.getAlivePlayers();
          if (survivors.length === 1) {
            const winner = survivors[0];
            this.handleVictory(winner);
            return;
          }

          if (survivors.length === 0) {
            this.gameOver = true;
            this.isAnimating = false;
            this.isQuestionOpen = false;
            this.statusText.setText('Sem vencedores');
            this.infoText.setText('Todos os jogadores foram eliminados pela tempestade.');
            this.disableRollButton();

            this.showEndModal({
              title: 'Fim de jogo',
              winnerName: 'Sem vencedor',
              message: 'A tempestade engoliu todos os jogadores. Todos perderam.'
            });
            return;
          }
        }
      }

      flashStormWarning(casa) {
        return new Promise((resolve) => {
          const overlay = this.stormOverlays[casa];

          this.tweens.add({
            targets: overlay,
            alpha: 0.45,
            duration: 90,
            yoyo: true,
            repeat: 2,
            onComplete: () => {
              overlay.alpha = 0;
              resolve();
            }
          });
        });
      }

      flashSpecialHouse(casa) {
        return new Promise((resolve) => {
          const cell = this.boardCells[casa];

          this.tweens.add({
            targets: cell,
            alpha: 0.25,
            scaleX: 1.08,
            scaleY: 1.08,
            duration: 110,
            yoyo: true,
            repeat: 4,
            onComplete: () => {
              cell.alpha = 1;
              cell.scaleX = 1;
              cell.scaleY = 1;
              resolve();
            }
          });
        });
      }

      shakeToken(token) {
        return new Promise((resolve) => {
          const originalX = token.x;

          this.tweens.add({
            targets: token,
            x: originalX + 10,
            duration: 45,
            yoyo: true,
            repeat: 5,
            onComplete: () => {
              token.x = originalX;
              resolve();
            }
          });
        });
      }

      showQuestionModal(questionData) {
        return new Promise((resolve) => {
          this.isQuestionOpen = true;

          const overlay = this.add.rectangle(
            this.gameWidth / 2,
            this.gameHeight / 2,
            this.gameWidth,
            this.gameHeight,
            0x000000,
            0.62
          ).setDepth(1000);

          const modalCenterY = this.gameHeight / 2 - 20;
          const modalWidth = 760;
          const modalHeight = 430;

          const modal = this.add.rectangle(
            this.gameWidth / 2,
            modalCenterY,
            modalWidth,
            modalHeight,
            0xf8fafc,
            1
          )
            .setStrokeStyle(3, 0x1f2937)
            .setDepth(1001);

          const title = this.add.text(this.gameWidth / 2, modalCenterY - 120, 'Pergunta', {
            fontSize: '34px',
            color: '#111827',
            fontStyle: 'bold'
          }).setOrigin(0.5).setDepth(1002);

          const questionText = this.add.text(this.gameWidth / 2, modalCenterY - 54, questionData.question, {
            fontSize: '28px',
            color: '#111827',
            align: 'center',
            wordWrap: { width: 640 }
          }).setOrigin(0.5).setDepth(1002);

          const buttons = [];
          const buttonTexts = [];

          const startY = modalCenterY + 34;
          const gapY = 58;

          questionData.options.forEach((option, index) => {
            const btnY = startY + index * gapY;

            const button = this.add.rectangle(
              this.gameWidth / 2,
              btnY,
              560,
              42,
              0xdbeafe,
              1
            )
              .setStrokeStyle(2, 0x1e3a8a)
              .setInteractive({ useHandCursor: true })
              .setDepth(1002);

            const buttonText = this.add.text(this.gameWidth / 2, btnY, option, {
              fontSize: '22px',
              color: '#111827'
            }).setOrigin(0.5).setDepth(1003);

            button.on('pointerover', () => button.setFillStyle(0xbfdbfe));
            button.on('pointerout', () => button.setFillStyle(0xdbeafe));

            button.on('pointerdown', () => {
              buttons.forEach((b) => b.disableInteractive());

              const isCorrect = index === questionData.answer;
              button.setFillStyle(isCorrect ? 0x86efac : 0xfca5a5);

              this.time.delayedCall(500, () => {
                overlay.destroy();
                modal.destroy();
                title.destroy();
                questionText.destroy();
                buttons.forEach((b) => b.destroy());
                buttonTexts.forEach((t) => t.destroy());

                this.isQuestionOpen = false;
                resolve(isCorrect);
              });
            });

            buttons.push(button);
            buttonTexts.push(buttonText);
          });
        });
      }

      showPlayerSetupModal() {
        this.isPlayerSetupOpen = true;
        this.disableRollButton();

        const overlay = this.add.rectangle(
          this.gameWidth / 2,
          this.gameHeight / 2,
          this.gameWidth,
          this.gameHeight,
          0x000000,
          0.72
        ).setDepth(2000);

        const modalShadow = this.add.rectangle(this.gameWidth / 2 + 6, this.gameHeight / 2 + 6, 860, 560, 0x000000, 0.18)
          .setDepth(2001);

        const modalBg = this.add.rectangle(this.gameWidth / 2, this.gameHeight / 2, 860, 560, 0xf8fafc, 1)
          .setStrokeStyle(3, 0x1f2937)
          .setDepth(2002);

        const modalDom = this.add.dom(this.gameWidth / 2, this.gameHeight / 2).createFromHTML(`
          <div style="
            width: 800px;
            box-sizing: border-box;
            padding: 26px 34px 26px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            font-family: Arial, sans-serif;
            color: #111827;
          ">
            <div style="text-align:center; font-size:32px; font-weight:700;">
              Configure a partida
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: end;">
              <div style="display:flex; flex-direction:column; gap:8px;">
                <label style="font-size:22px; font-weight:700;">Quantidade de jogadores</label>
                <select id="playersCount" style="
                  width: 100%;
                  height: 48px;
                  font-size: 22px;
                  padding: 6px 10px;
                  border: 2px solid #475569;
                  border-radius: 4px;
                  background: #ffffff;
                  color: #111827;
                ">
                  <option value="2" selected>2 jogadores</option>
                  <option value="3">3 jogadores</option>
                  <option value="4">4 jogadores</option>
                </select>
              </div>
              <div style="display:flex; flex-direction:column; gap:8px;">
                <label style="font-size:22px; font-weight:700;">Categoria de perguntas</label>
                <select id="questionCategory" style="
                  width: 100%;
                  height: 48px;
                  font-size: 22px;
                  padding: 6px 10px;
                  border: 2px solid #475569;
                  border-radius: 4px;
                  background: #ffffff;
                  color: #111827;
                ">
                  <option value="Tecnologia" selected>Tecnologia</option>
                  <option value="Sobre o Brasil">Sobre o Brasil</option>
                  <option value="Filmes">Filmes</option>
                  <option value="Músicas">Músicas</option>
                </select>
              </div>
            </div>

            <div id="playersFields" style="display:flex; flex-direction:column; gap:14px; margin-top:4px;">
              ${[1, 2, 3, 4].map((n) => `
                <div class="player-row" data-player="${n}" style="
                  display:grid;
                  grid-template-columns: 180px 1fr;
                  align-items:center;
                  column-gap:18px;
                ">
                  <label for="player${n}Name" style="
                    font-size:22px;
                    font-weight:700;
                    text-align:right;
                  ">Jogador ${n}</label>
                  <input
                    id="player${n}Name"
                    type="text"
                    maxlength="20"
                    value="Jogador ${n}"
                    style="
                      width:100%;
                      height:50px;
                      box-sizing:border-box;
                      font-size:24px;
                      padding:10px 14px;
                      border:2px solid #475569;
                      border-radius:4px;
                      outline:none;
                      background:#ffffff;
                      color:#111827;
                    "
                  />
                </div>
              `).join('')}
            </div>

            <div id="playerSetupError" style="
              min-height: 24px;
              text-align: center;
              font-size: 18px;
              font-weight: 700;
              color: #b91c1c;
            "></div>

            <div style="display:flex; justify-content:center; margin-top:6px;">
              <button
                id="startPlayersButton"
                style="
                  min-width: 280px;
                  height: 58px;
                  padding: 0 24px;
                  border: 2px solid #14532d;
                  border-radius: 4px;
                  background: #86efac;
                  color: #111827;
                  font-size: 28px;
                  font-weight: 700;
                  cursor: pointer;
                "
              >
                Começar partida
              </button>
            </div>
          </div>
        `).setDepth(2003);

        const node = modalDom.node;
        const countSelect = node.querySelector('#playersCount');
        const errorNode = node.querySelector('#playerSetupError');
        const startBtn = node.querySelector('#startPlayersButton');
        const rows = Array.from(node.querySelectorAll('.player-row'));

        const applyPlayerCountVisibility = () => {
          const count = Number(countSelect.value);

          rows.forEach((row, index) => {
            row.style.display = index < count ? 'grid' : 'none';
          });
        };

        applyPlayerCountVisibility();

        countSelect.addEventListener('change', applyPlayerCountVisibility);

        const submit = () => {
          const count = Number(countSelect.value);
          const category = node.querySelector('#questionCategory').value;

          if (count < 2 || count > 4) {
            errorNode.textContent = 'A partida deve ter entre 2 e 4 jogadores.';
            return;
          }

          const names = [];
          for (let i = 1; i <= count; i++) {
            const input = node.querySelector(`#player${i}Name`);
            const name = (input.value || '').trim();

            if (!name) {
              errorNode.textContent = 'Todos os nomes dos jogadores ativos devem ser preenchidos.';
              return;
            }

            names.push(name);
          }

          this.selectedCategory = category;
          this.availableQuestions = [...this.questionPools[category]];
          this.activePlayersCount = count;

          for (let i = 0; i < this.maxPlayers; i++) {
            this.players[i].enabled = i < count;
            this.players[i].alive = i < count;
            this.players[i].posicao = 1;
            this.players[i].nome = i < count ? names[i] : `Jogador ${i + 1}`;
          }

          this.currentPlayer = 0;
          this.refreshPlayerTokensVisibility();

          for (let i = 0; i < this.maxPlayers; i++) {
            if (this.players[i].enabled) {
              const pos = this.getTokenPosition(1, i);
              this.players[i].token.setPosition(pos.x, pos.y);
              this.players[i].token.setAlpha(1);
              this.players[i].token.setScale(1);
            }
          }

          overlay.destroy();
          modalShadow.destroy();
          modalBg.destroy();
          modalDom.destroy();

          this.isPlayerSetupOpen = false;
          this.updateHeaderNames();
          this.infoText.setText('Clique para começar.');
          this.enableRollButton(this.players[this.currentPlayer].nome);
        };

        startBtn.addEventListener('mouseenter', () => {
          startBtn.style.background = '#bbf7d0';
        });

        startBtn.addEventListener('mouseleave', () => {
          startBtn.style.background = '#86efac';
        });

        startBtn.addEventListener('click', submit);

        const firstInput = node.querySelector('#player1Name');
        const secondInput = node.querySelector('#player2Name');

        firstInput.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') secondInput.focus();
        });

        this.time.delayedCall(50, () => {
          firstInput.focus();
          firstInput.select();
        });
      }

      showEndModal({ title, winnerName, message }) {
        this.isEndModalOpen = true;

        const overlay = this.add.rectangle(
          this.gameWidth / 2,
          this.gameHeight / 2,
          this.gameWidth,
          this.gameHeight,
          0x000000,
          0.72
        ).setDepth(3000);

        const modal = this.add.rectangle(this.gameWidth / 2, this.gameHeight / 2, 780, 340, 0xf8fafc, 1)
          .setStrokeStyle(3, 0x1f2937)
          .setDepth(3001);

        const titleText = this.add.text(this.gameWidth / 2, 390, title, {
          fontSize: '36px',
          color: '#111827',
          fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(3002);

        const winnerText = this.add.text(this.gameWidth / 2, 450, winnerName, {
          fontSize: '34px',
          color: '#15803d',
          fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(3002);

        const messageText = this.add.text(this.gameWidth / 2, 532, message, {
          fontSize: '23px',
          color: '#111827',
          align: 'center',
          wordWrap: { width: 640 }
        }).setOrigin(0.5).setDepth(3002);

        const restartButton = this.add.rectangle(this.gameWidth / 2, 628, 250, 56, 0x93c5fd, 1)
          .setStrokeStyle(2, 0x1e3a8a)
          .setInteractive({ useHandCursor: true })
          .setDepth(3002);

        const restartText = this.add.text(this.gameWidth / 2, 628, 'Jogar novamente', {
          fontSize: '26px',
          color: '#111827',
          fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(3003);

        restartButton.on('pointerover', () => restartButton.setFillStyle(0xbfdbfe));
        restartButton.on('pointerout', () => restartButton.setFillStyle(0x93c5fd));

        restartButton.on('pointerdown', () => {
          this.isEndModalOpen = false;
          this.scene.restart();
        });
      }

      disableRollButton(label = 'Indisponível') {
        this.rollButton.disableInteractive();
        this.rollButton.setFillStyle(0x6b7280);
        this.updateRollButtonLabel(label);
      }

      enableRollButton(label) {
        if (
          !this.gameOver &&
          !this.isQuestionOpen &&
          !this.isPlayerSetupOpen &&
          !this.isEndModalOpen &&
          !this.isDiceModalOpen &&
          !this.isSuspenseModalOpen &&
          !this.isAnimating
        ) {
          this.rollButton.setInteractive({ useHandCursor: true });
          this.rollButton.setFillStyle(0xf59e0b);

          const current = this.players[this.currentPlayer];
          this.updateRollButtonLabel(label || (current ? current.nome : 'Sua vez'));
        }
      }
    }

    const config = {
      type: Phaser.AUTO,
      width: 1500,
      height: 1000,
      parent: 'game-container',
      backgroundColor: '#111827',
      dom: {
        createContainer: true
      },
      scene: [DiceGameScene]
    };

    new Phaser.Game(config);
  </script>
</body>

</html>
